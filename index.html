function makeSprite(rows, palette) {
  const h = rows.length;
  const w = rows[0].length;
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const g = canvas.getContext('2d');
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const color = palette[rows[y][x]];
      if (color) {
        g.fillStyle = color;
        g.fillRect(x, y, 1, 1);
      }
    }
  }
  return canvas;
}

const audio = {
  ctx: null,
  master: null,
  thrustGain: null,
  muted: false,
  musicStep: 0,
  musicNextTime: 0,
  musicTimer: null,
  victorySong: null,

  init() {
    if (this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    try {
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = this.muted ? 0 : 0.6;
      this.master.connect(this.ctx.destination);

      const seconds = 1;
      const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * seconds, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      const noise = this.ctx.createBufferSource();
      noise.buffer = buffer;
      noise.loop = true;
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 600;
      this.thrustGain = this.ctx.createGain();
      this.thrustGain.gain.value = 0;
      noise.connect(filter);
      filter.connect(this.thrustGain);
      this.thrustGain.connect(this.master);
      noise.start();

      this.startMusic();
    } catch (e) {
      this.ctx = null;
    }
  },

  toggleMute() {
    this.muted = !this.muted;
    if (this.master) this.master.gain.value = this.muted ? 0 : 0.6;
    if (this.victorySong) this.victorySong.muted = this.muted;
  },

  setThrust(on) {
    if (!this.ctx) return;
    this.thrustGain.gain.setTargetAtTime(on ? 0.22 : 0, this.ctx.currentTime, 0.05);
  },

  note(midi, when, duration, type, volume) {
    const osc = this.ctx.createOscillator();
    osc.type = type;
    osc.frequency.value = 440 * Math.pow(2, (midi - 69) / 12);
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(volume, when);
    gain.gain.exponentialRampToValueAtTime(0.001, when + duration);
    osc.connect(gain);
    gain.connect(this.master);
    osc.start(when);
    osc.stop(when + duration + 0.02);
  },

  blip(midi, delay, duration, volume) {
    if (!this.ctx) return;
    this.note(midi, this.ctx.currentTime + delay, duration, 'square', volume);
  },

  sfxLanding() {
    this.blip(72, 0, 0.1, 0.14);
    this.blip(79, 0.09, 0.16, 0.14);
  },

  sfxCountdownTick() {
    // bip curto e grave a cada segundo da contagem regressiva
    this.blip(69, 0, 0.14, 0.18);
  },

  sfxCountdownGo() {
    // tom mais agudo e longo no "vai!" (fim da contagem)
    this.blip(81, 0, 0.28, 0.2);
    this.blip(88, 0.12, 0.3, 0.16);
  },

  sfxPickup() {
    this.blip(88, 0, 0.07, 0.13);
    this.blip(95, 0.06, 0.12, 0.13);
  },

  sfxSling() {
    this.blip(48, 0, 0.08, 0.16);
    this.blip(60, 0.05, 0.08, 0.16);
    this.blip(72, 0.1, 0.2, 0.16);
  },

  sfxBark() {
    if (!this.ctx) return;
    const t0 = this.ctx.currentTime;
    // dois "au au": cada woof tem um sweep de tom que sobe rápido e cai (contorno
    // típico de latido), dois osciladores desafinados para dar corpo, um filtro
    // que abre e fecha como formante vocal, e um estalo de ruído no ataque
    [0, 0.22].forEach((delay, idx) => {
      const t = t0 + delay;
      const dur = 0.18;
      const base = idx === 0 ? 300 : 260; // o segundo woof é levemente mais grave

      const filter = this.ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.Q.value = 4;
      filter.frequency.setValueAtTime(900, t);
      filter.frequency.linearRampToValueAtTime(1500, t + 0.04);
      filter.frequency.exponentialRampToValueAtTime(500, t + dur);

      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.02);
      gain.gain.setValueAtTime(0.22, t + 0.07);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      filter.connect(gain);
      gain.connect(this.master);

      [1, 1.5].forEach((mult, i) => {
        const osc = this.ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(base * mult * 0.7, t);
        osc.frequency.linearRampToValueAtTime(base * mult, t + 0.03);
        osc.frequency.exponentialRampToValueAtTime(base * mult * 0.55, t + dur);
        osc.detune.value = i === 0 ? -8 : 12;
        osc.connect(filter);
        osc.start(t);
        osc.stop(t + dur + 0.02);
      });

      // transiente de ruído (a consoante "b" do woof)
      const noiseDur = 0.05;
      const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * noiseDur, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      const noise = this.ctx.createBufferSource();
      noise.buffer = buffer;
      const noiseGain = this.ctx.createGain();
      noiseGain.gain.setValueAtTime(0.12, t);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, t + noiseDur);
      noise.connect(noiseGain);
      noiseGain.connect(this.master);
      noise.start(t);
    });
  },

  sfxDrill() {
    if (!this.ctx) return;
    const t0 = this.ctx.currentTime;
    const duration = 0.5;
    const osc = this.ctx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = 2400;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.0001, t0);
    const pulses = 10;
    for (let i = 0; i < pulses; i++) {
      const tt = t0 + i * (duration / pulses);
      gain.gain.setValueAtTime(0.12, tt);
      gain.gain.setValueAtTime(0.01, tt + (duration / pulses) * 0.55);
    }
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration + 0.05);
    osc.connect(gain);
    gain.connect(this.master);
    osc.start(t0);
    osc.stop(t0 + duration + 0.08);
  },

  sfxVictory() {
    this.blip(72, 0, 0.12, 0.15);
    this.blip(76, 0.12, 0.12, 0.15);
    this.blip(79, 0.24, 0.12, 0.15);
    this.blip(84, 0.36, 0.4, 0.16);
  },

  sfxExplosion() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const duration = 0.7;
    const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * duration, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 900;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(this.master);
    src.start(t);

    const osc = this.ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.5);
    const oscGain = this.ctx.createGain();
    oscGain.gain.setValueAtTime(0.25, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(oscGain);
    oscGain.connect(this.master);
    osc.start(t);
    osc.stop(t + 0.55);
  },

  startMusic() {
    // Espaço Lo-fi: melodia lenta e esparsa, ondas suaves e acordes flutuantes.
    const LEAD = [72, 0, 0, 0, 0, 0, 0, 0, 74, 0, 0, 0, 71, 0, 0, 0,
                  69, 0, 0, 0, 0, 0, 0, 0, 67, 0, 0, 0, 72, 0, 74, 0];
    const stepDuration = 0.26;
    const len = 32;
    this.musicNextTime = this.ctx.currentTime + 0.1;
    if (this.musicTimer) clearInterval(this.musicTimer);
    this.musicTimer = setInterval(() => {
      if (!this.ctx) return;
      while (this.musicNextTime < this.ctx.currentTime + 0.2) {
        const step = this.musicStep % len;
        const d = stepDuration;
        const lead = LEAD[step];
        if (lead) this.note(lead, this.musicNextTime, d * 3, 'sine', 0.05);
        if (step === 0) {
          [60, 64, 67, 71].forEach(n => this.note(n, this.musicNextTime, d * 15, 'sine', 0.028));
          this.note(36, this.musicNextTime, d * 15, 'triangle', 0.05);
        }
        if (step === 16) {
          [57, 60, 64, 67].forEach(n => this.note(n, this.musicNextTime, d * 15, 'sine', 0.028));
          this.note(33, this.musicNextTime, d * 15, 'triangle', 0.05);
        }
        this.musicNextTime += stepDuration;
        this.musicStep++;
      }
    }, 25);
  },

  stopMusic() {
    if (this.musicTimer) { clearInterval(this.musicTimer); this.musicTimer = null; }
  },

  playVictorySong() {
    // para a trilha 8-bit e toca "We Are The Champions"
    this.stopMusic();
    if (!this.victorySong) {
      this.victorySong = new Audio('assets/we-are-the-champions.mp3');
      this.victorySong.volume = 0.7;
      this.victorySong.preload = 'auto';
    }
    this.victorySong.muted = this.muted;
    const CHORUS_START = 58; // pula direto pro refrão "We are the champions"
    const startAtChorus = () => {
      try { this.victorySong.currentTime = CHORUS_START; } catch (e) {}
      this.victorySong.play().catch(() => {});
    };
    // só dá pra buscar o segundo 58 depois dos metadados carregarem; se ainda
    // não carregaram, o seek é ignorado e a música começa do início
    if (this.victorySong.readyState >= 1) {
      startAtChorus();
    } else {
      this.victorySong.addEventListener('loadedmetadata', startAtChorus, { once: true });
      this.victorySong.load();
    }
  },

  stopVictorySong() {
    if (this.victorySong) { this.victorySong.pause(); this.victorySong.currentTime = 0; }
  },
};

const SAVE_KEY = 'rocket_lemon_save_v1';

const COIN_SPAWN_BY_DIFF = {

  medium: [0, 2],
  hard: [1, 2],
};

function defaultWallet() {
  return {
    version: 2,
    coins: 0,
    totalEarned: 0,
    inventory: { rocketSkins: ['default'], trails: ['default'], accessories: ['none'] },
    equipped: { rocketSkin: 'default', trail: 'default', accessory: 'none' },
  };
}

function migrateWalletV1(data) {
  return sanitizeWallet({
    version: 2,
    coins: data.coins,
    totalEarned: data.totalEarned,
    inventory: { rocketSkins: ['default'], trails: ['default'], accessories: ['none'] },
    equipped: { rocketSkin: 'default', trail: 'default', accessory: 'none' },
  });
}

function isValidWalletV2(data) {
  return data.version === 2
    && typeof data.coins === 'number'
    && typeof data.totalEarned === 'number'
    && data.inventory
    && Array.isArray(data.inventory.rocketSkins)
    && Array.isArray(data.inventory.trails)
    && Array.isArray(data.inventory.accessories)
    && data.equipped
    && typeof data.equipped.rocketSkin === 'string'
    && typeof data.equipped.trail === 'string'
    && typeof data.equipped.accessory === 'string';
}

function sanitizeWallet(data) {
  const coins = (typeof data.coins === 'number' && Number.isFinite(data.coins) && data.coins >= 0)
    ? data.coins
    : 0;
  const totalEarned = (typeof data.totalEarned === 'number' && Number.isFinite(data.totalEarned) && data.totalEarned >= 0)
    ? data.totalEarned
    : 0;
  const inventory = {};
  const equipped = {};
  for (const cat of SHOP_CATEGORIES) {
    const catalog = SHOP_CATALOGS[cat];
    const fallback = DEFAULT_OWNED[cat];
    const equipKey = EQUIP_KEY[cat];
    const seen = new Set();
    const list = [];
    const rawList = Array.isArray(data.inventory?.[cat]) ? data.inventory[cat] : [];
    for (const id of rawList) {
      if (typeof id === 'string' && catalog[id] && !seen.has(id)) {
        seen.add(id);
        list.push(id);
      }
    }
    if (!seen.has(fallback)) list.unshift(fallback);
    inventory[cat] = list;
    const equippedId = data.equipped?.[equipKey];
    equipped[equipKey] = (typeof equippedId === 'string' && list.includes(equippedId))
      ? equippedId
      : fallback;
  }
  return { version: 2, coins, totalEarned, inventory, equipped };
}

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) {
      wallet = defaultWallet();
      return;
    }
    const data = JSON.parse(raw);
    if (data.version === 1 && typeof data.coins === 'number' && typeof data.totalEarned === 'number') {
      wallet = migrateWalletV1(data);
      saveWallet();
      return;
    }
    if (!isValidWalletV2(data)) {
      wallet = defaultWallet();
      return;
    }
    wallet = sanitizeWallet(data);
    if (JSON.stringify(wallet) !== JSON.stringify(data)) saveWallet();
  } catch {
    wallet = defaultWallet();
  }
}

function saveWallet() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(wallet));
  } catch { /* quota or private browsing */ }
}

function getEquippedRocketSprite() {

function getEquippedFlames() {
  const id = wallet?.equipped?.trail || 'default';
  return TRAILS[id]?.flames || { flame1: SPRITES.flame1, flame2: SPRITES.flame2 };
}

function getActiveTrailColors() {
  const id = wallet?.equipped?.trail || 'default';
  const trail = TRAILS[id];
  if (!trail) return ['#ffd166', '#ff7b3a', '#ffffff'];
  if (trail.rainbow) {
    const colors = trail.colors;
    return [colors[Math.floor(time * 8) % colors.length], colors[(Math.floor(time * 8) + 2) % colors.length]];
  }
  return trail.colors;
}

function isOwned(category, id) {
  return wallet.inventory[category].includes(id);
}

function canAfford(price) {
  return wallet.coins >= price;
}

function equipItem(category, id, silent) {
  if (!isOwned(category, id)) return false;
  const equipKey = EQUIP_KEY[category];
  if (wallet.equipped[equipKey] === id) return false;
  wallet.equipped[equipKey] = id;
  saveWallet();
  if (!silent) {
    addToast('EQUIPADO!');
    audio.sfxPickup();
  }
  return true;
}

function purchaseItem(category, id) {
  const item = SHOP_CATALOGS[category]?.[id];
  if (!item) return false;
  if (isOwned(category, id)) return equipItem(category, id);

  if (!canAfford(item.price)) {
    addToast('MOEDAS INSUFICIENTES');
    return false;
  }

  const equipKey = EQUIP_KEY[category];
  wallet.coins -= item.price;
  wallet.inventory[category].push(id);
  wallet.equipped[equipKey] = id;
  saveWallet();
  addToast('COMPRADO!');
  audio.sfxPickup();
  return true;
}

  if (key === 'ArrowDown' && index + cols < count) return index + cols;
  if (key === 'ArrowUp' && index - cols >= 0) return index - cols;

function drawCosmeticRocketAt(cx, cy, angle, scale, skinId, trailId, accessoryId, showFlame) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  const skinSprite = ROCKET_SKINS[skinId]?.sprite || SPRITES.rocket;
  const hw = 11 * scale;
  const hh = 16 * scale;
  ctx.drawImage(skinSprite, -hw, -hh, hw * 2, hh * 2);
  const acc = ACCESSORIES[accessoryId || 'none'];
  if (acc && acc.draw) acc.draw(ctx, scale);
  if (showFlame) {
    const flames = TRAILS[trailId]?.flames || { flame1: SPRITES.flame1, flame2: SPRITES.flame2 };
    const flame = Math.floor(time * 14) % 2 === 0 ? flames.flame1 : flames.flame2;
    ctx.drawImage(flame, -5 * scale, 15 * scale, 10 * scale, 8 * scale);
  }
  ctx.restore();
}

function drawCardCornerAccents(x, y, w, pulse) {
  const len = 14;
  const alpha = 0.5 + pulse * 0.3;
  ctx.strokeStyle = 'rgba(255,209,102,' + alpha + ')';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x + 8, y);
  ctx.lineTo(x, y);
  ctx.lineTo(x, y + len);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + w - 8, y);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w, y + len);
  ctx.stroke();
}

function drawShopItemCard(category, id, rect, selected) {
  const item = SHOP_CATALOGS[category][id];
  const { x, y, w, h } = rect;
  const pulse = selected ? 0.5 + 0.5 * Math.sin(time * 4) : 0;
  const owned = isOwned(category, id);
  const equipped = isEquipped(category, id);

  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, selected ? 'rgba(255,255,255,0.11)' : 'rgba(255,255,255,0.06)');
  grad.addColorStop(1, selected ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.02)');
  ctx.fillStyle = grad;
  roundRect(x, y, w, h, 10);
  ctx.fill();

  if (selected) {
    ctx.save();
    ctx.shadowColor = 'rgba(255,209,102,0.45)';
    ctx.shadowBlur = 8 + pulse * 8;
    ctx.strokeStyle = 'rgba(255,209,102,0.85)';
    ctx.lineWidth = 2;
    roundRect(x, y, w, h, 10);
    ctx.stroke();
    ctx.restore();
    drawCardCornerAccents(x, y, w, pulse);
  } else {
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    roundRect(x, y, w, h, 10);
    ctx.stroke();
  }

  const previewScale = 1.8;
  if (category === 'rocketSkins') {
    const sprite = ROCKET_SKINS[id]?.sprite || SPRITES.rocket;
    ctx.drawImage(sprite, x + 12, y + h / 2 - 14, 22 * previewScale / 2, 32 * previewScale / 2);
  } else if (category === 'trails') {
    const flames = TRAILS[id]?.flames || { flame1: SPRITES.flame1, flame2: SPRITES.flame2 };
    const flame = Math.floor(time * 10) % 2 === 0 ? flames.flame1 : flames.flame2;
    ctx.drawImage(flame, x + 16, y + h / 2 - 8, 20, 16);
  } else if (category === 'accessories' && id !== 'none') {
    ctx.save();
    ctx.translate(x + 28, y + h / 2);
    ACCESSORIES[id].draw(ctx, 1.2);
    ctx.restore();
    const sprite = getEquippedRocketSprite();
    ctx.globalAlpha = 0.35;
    ctx.drawImage(sprite, x + 12, y + h / 2 - 14, 19, 28);
    ctx.globalAlpha = 1;
  } else {
    ctx.font = '11px monospace';
    ctx.fillStyle = '#5a6478';
    ctx.textAlign = 'center';
    ctx.fillText('—', x + 28, y + h / 2 + 4);
    ctx.textAlign = 'left';
  }

  ctx.font = selected ? 'bold 12px monospace' : '12px monospace';
  ctx.fillStyle = selected ? '#ffffff' : '#8892a6';
  ctx.fillText(item.label, x + 56, y + 28);

  ctx.font = '10px monospace';
  if (equipped) {
    ctx.fillStyle = '#57c74f';
    ctx.fillText('EQUIPADO', x + 56, y + 48);
  } else if (owned) {
    ctx.fillStyle = '#8fa3c8';
    ctx.fillText('ADQUIRIDO', x + 56, y + 48);
  } else if (item.price === 0) {
    ctx.fillStyle = '#8fa3c8';
    ctx.fillText('GRÁTIS', x + 56, y + 48);
  } else {
    ctx.fillStyle = '#ffd166';
    ctx.drawImage(SPRITES.coin, x + 56, y + 36, 10, 10);
    ctx.fillText(String(item.price), x + 70, y + 48);
  }
}

function handleShopTap(x, y) {
  const back = getShopBackButtonRect();
  if (x >= back.x && x <= back.x + back.w && y >= back.y && y <= back.y + back.h) {
    leaveShop();
    return;
  }

  const layout = getShopLayout();
  const tabW = 160;
  const tabStartX = (W - tabW * 3) / 2;
  for (let t = 0; t < 3; t++) {
    const tx = tabStartX + t * tabW;
    if (x >= tx && x <= tx + tabW - 8 && y >= layout.tabY - 20 && y <= layout.tabY + 8) {
      shopTab = t;
      shopIndex = 0;
      return;
    }
  }

  const keys = getShopItemKeys();
  for (let i = 0; i < keys.length; i++) {
    const r = shopCardRect(i);
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
      if (i === shopIndex) handleShopConfirm();
      else shopIndex = i;
      return;
    }
  }

  const btn = shopActionButtonRect();
  if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
    handleShopConfirm();
  }
}

function distToPlatform(x, y, p) {
  const cx = p.x + p.w / 2;
  const dx = Math.max(Math.abs(x - cx) - p.w / 2, 0);
  const dy = Math.abs(y - p.y);
  return Math.sqrt(dx * dx + dy * dy);
}

function isValidCoinPos(x, y) {
  for (const p of platforms) {
    if (distToPlatform(x, y, p) < CONFIG.coinMinPadDist) return false;
  }
  return true;
}

function obstaclesInSegment(s, boundaries) {
  return obstacles.filter(o => o.y >= boundaries[s] && o.y <= boundaries[s + 1]);
}

function coinValueAt(x, y, segObs) {
  const bonusDist = CONFIG.coinObstacleBonusDist;
  for (const o of segObs) {
    const dx = x - o.x;
    const dy = y - o.y;
    if (dx * dx + dy * dy < bonusDist * bonusDist) return 3;
  }
  return 1;
}

function trySpawnCoin(x, y, segObs) {
  if (!isValidCoinPos(x, y)) return null;
  return {
    x,
    y,
    value: coinValueAt(x, y, segObs),
    collected: false,
    bobPhase: Math.random() * Math.PI * 2,
  };
}

function generateCoins(diffKey, boundaries) {
  coins = [];
  const [minPerSeg, maxPerSeg] = COIN_SPAWN_BY_DIFF[diffKey];
  for (let s = 0; s < boundaries.length - 1; s++) {
    const count = minPerSeg + Math.floor(Math.random() * (maxPerSeg - minPerSeg + 1));
    const yMin = boundaries[s] + 100;
    const yMax = boundaries[s + 1] - 100;
    if (yMax <= yMin) continue;
    const segObs = obstaclesInSegment(s, boundaries);
    for (let c = 0; c < count; c++) {
      let placed = null;
      for (let t = 0; t < CONFIG.coinSpawnRetries; t++) {
        const x = 30 + Math.random() * (W - 60);
        const y = yMin + Math.random() * (yMax - yMin);
        placed = trySpawnCoin(x, y, segObs);
        if (placed) break;
      }
      if (placed) coins.push(placed);
    }
  }
  const planetY = platforms[platforms.length - 1].y;
  const ballisticCount = 1 + Math.floor(Math.random() * 2);
  const bYMin = planetY + 80;
  const bYMax = moon.y - 80;
  if (bYMax > bYMin) {
    for (let c = 0; c < ballisticCount; c++) {
      let placed = null;
      for (let t = 0; t < CONFIG.coinSpawnRetries; t++) {
        const x = 30 + Math.random() * (W - 60);
        const y = bYMin + Math.random() * (bYMax - bYMin);
        placed = trySpawnCoin(x, y, []);
        if (placed) {
          placed.value = 3;
          break;
        }
      }
      if (placed) coins.push(placed);
    }
  }
}

function collectCoin(coin) {
  if (coin.collected) return;
  coin.collected = true;
  wallet.coins += coin.value;
  wallet.totalEarned += coin.value;
  saveWallet();
  addToast('+' + coin.value + (coin.value === 1 ? ' MOEDA' : ' MOEDAS'));
  audio.sfxPickup();
  for (let i = 0; i < 14; i++) {
    particles.push({
      x: coin.x,
      y: coin.y,
      vx: (Math.random() * 2 - 1) * 120,
      vy: (Math.random() * 2 - 1) * 120,
      life: 0.4 + Math.random() * 0.3,
      color: Math.random() < 0.5 ? '#ffd166' : '#ffffff',
    });
  }
}

function updateCoinCollisions() {
  const reachSq = CONFIG.coinCollectRadius * CONFIG.coinCollectRadius;
  for (const coin of coins) {
    if (coin.collected) continue;
    const dx = rocket.x - coin.x;
    const dy = rocket.y - coin.y;
    if (dx * dx + dy * dy < reachSq) collectCoin(coin);
  }
}

function drawCoins() {
  for (const coin of coins) {
    if (coin.collected) continue;
    const y = sy(coin.y) + Math.sin(time * 3 + coin.bobPhase) * 3;
    if (y < -30 || y > H + 30) continue;
    ctx.shadowColor = '#ffd166';
    ctx.shadowBlur = 18;
    ctx.drawImage(SPRITES.coin, coin.x - 12, y - 12, 24, 24);
    ctx.shadowBlur = 0;
  }
}

function drawCoinBalanceInline(fuelBarX, fuelBarY, fuelBarW, fuelBarH) {
  const coinAreaX = fuelBarX + fuelBarW + 14;
  const centerY = fuelBarY + fuelBarH / 2;
  ctx.shadowColor = '#ffd166';
  ctx.shadowBlur = 6;
  ctx.drawImage(SPRITES.coin, coinAreaX, centerY - 7, 14, 14);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = '#ffd166';
  ctx.fillText(String(wallet.coins), coinAreaX + 18, centerY + 4);
}

function generateWorld(diffKey) {
  const diff = DIFFICULTIES[diffKey];
  platforms = [];
  for (let i = 0; i < diff.platforms; i++) {
    const w = CONFIG.padWidth;
    platforms.push({
      x: 40 + Math.random() * (W - 80 - w),
      y: (i + 1) * CONFIG.segmentHeight,
      w,
      lemonCollected: false,
    });
  }
  platforms.push({
    x: W / 2 - CONFIG.planetPadWidth / 2,
    y: (diff.platforms + 1) * CONFIG.segmentHeight,
    w: CONFIG.planetPadWidth,
    isPlanet: true,
  });
  moon.y = platforms[platforms.length - 1].y + CONFIG.moonDistance;
  worldTop = moon.y + 350;

  obstacles = [];
  const boundaries = [0, ...platforms.map(p => p.y)];
  for (let s = 0; s < boundaries.length - 1; s++) {
    const [minCount, maxCount] = diff.obstacleCount;
    const count = minCount + Math.floor(Math.random() * (maxCount - minCount + 1));
    for (let i = 0; i < count; i++) {
      const type = OBSTACLE_KEYS[Math.floor(Math.random() * OBSTACLE_KEYS.length)];
      const info = OBSTACLE_TYPES[type];
      const [minSpeed, maxSpeed] = diff.obstacleSpeed;
      obstacles.push({
        type,
        x: 30 + Math.random() * (W - 60),
        y: boundaries[s] + 140 + Math.random() * (boundaries[s + 1] - boundaries[s] - 280),
        dir: Math.random() < 0.5 ? -1 : 1,
        speed: minSpeed + Math.random() * (maxSpeed - minSpeed),
        bobAmp: info.bob,
        bobPhase: Math.random() * Math.PI * 2,
        radius: info.radius,
        soundPlayed: false,
      });
    }
  }
  hazards = [];
  cometTimer = 1 + Math.random() * (diff.cometMax - diff.cometMin) + diff.cometMin;
  flareTimer = 1 + Math.random() * (diff.flareMax - diff.flareMin) + diff.flareMin;
  generateCoins(diffKey, boundaries);
}

function getActiveStats() {
  const stats = CHARACTERS[currentCharacter].stats;
  return {
    fuelMax: stats.fuelMax || CONFIG.fuelMax,
    refuelAmount: stats.refuelAmount || CONFIG.refuelAmount,
    rotationSpeed: CONFIG.rotationSpeed * (stats.rotationMult || 1),
    autoStabilizeRate: CONFIG.autoStabilizeRate * (stats.stabilizeMult || 1),
    extendedHud: stats.extendedHud || false,
  };
}

function startGame(diffKey, isRetry) {
  audio.stopVictorySong();
  if (audio.ctx && !audio.musicTimer) audio.startMusic();
  currentDiff = diffKey;
  if (!isRetry) deathQuoteBag = [];
  attempts = isRetry ? attempts + 1 : 1;
  generateWorld(diffKey);
  const activeStats = getActiveStats();
  rocket.x = W / 2;
  rocket.y = CONFIG.rocketHalfHeight;
  rocket.vx = 0;
  rocket.vy = 0;
  rocket.angle = 0;
  rocket.fuel = activeStats.fuelMax;
  rocket.landed = true;
  targetIndex = 0;
  camY = -60;
  particles = [];
  thrustParticles = [];
  toasts = [];
  confetti = [];
  lemonRain = [];
  winTime = 0;
  ballistic = false;
  dragging = false;
  crashReason = '';
  deathQuote = '';
  keys.left = false;
  keys.right = false;
  keys.up = false;
  keys.down = false;
  neutralGamma = null;
  if (isMobile) enableTilt();
  stateBeforePause = 'playing';
  countdownLabel = 'DECOLAGEM EM...';
  resumeTimer = 3;
  state = 'resuming';
  audio.sfxCountdownTick(); // bip do primeiro número
  addToast(CHARACTERS[currentCharacter].startToast);
  addToast(isMobile ? 'SEGURE A TELA PARA DECOLAR' : 'PRESSIONE ↑ PARA DECOLAR');
}

// ---------------------------------------------------------------- update

function normalizeAngle(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}

function landingOk() {
  return Math.abs(rocket.vx) <= CONFIG.landingMaxVx &&
         Math.abs(rocket.vy) <= CONFIG.landingMaxVy &&
         Math.abs(normalizeAngle(rocket.angle)) <= CONFIG.landingMaxAngle;
}

function land(platform) {
  rocket.landed = true;
  rocket.y = (platform ? platform.y : 0) + CONFIG.rocketHalfHeight;
  rocket.vx = 0;
  rocket.vy = 0;
  rocket.angle = 0;
  audio.setThrust(false);
  if (!platform) {
    addToast('DE VOLTA À TERRA');
    audio.sfxLanding();
    return;
  }
  if (platform.isPlanet && targetIndex === platforms.length - 1) {
    enterSlingshot(platform);
    return;
  }
  audio.sfxLanding();
}

function enterSlingshot(pad) {
  state = 'slingshot';
  slingPad = pad;
  slingAngle = 0;
  slingPower = 0.7;
  slingBanner = 3;
  rocket.fuel = getActiveStats().fuelMax;
  audio.sfxLanding();
}

function launchSlingshot() {
  const speed = slingPower * CONFIG.slingMaxSpeed;
  rocket.x = slingPad.x + slingPad.w / 2;
  rocket.y = slingPad.y + 34;
  rocket.vx = Math.sin(slingAngle) * speed;
  rocket.vy = Math.cos(slingAngle) * speed;
  rocket.angle = slingAngle;
  rocket.landed = false;
  ballistic = true;
  dragging = false;
  state = 'playing';
  audio.sfxSling();
}

function moonImpactWin() {
  rocket.x = Math.max(W / 2 - 140, Math.min(W / 2 + 140, rocket.x));
  rocket.y = moonSurfaceAt(rocket.x) + CONFIG.rocketHalfHeight;
  rocket.vx = 0;
  rocket.vy = 0;
  rocket.angle = 0;
  rocket.landed = true;
  ballistic = false;
  state = 'win';
  winTime = 0;
  confetti = [];
  lemonRain = [];
  audio.setThrust(false);
  audio.sfxVictory();
  audio.playVictorySong();
}

function collectLemon(platform) {
  const activeStats = getActiveStats();
  platform.lemonCollected = true;
  targetIndex++;
  rocket.fuel = Math.min(activeStats.fuelMax, rocket.fuel + activeStats.refuelAmount);
  addToast('+' + activeStats.refuelAmount + ' COMB.');
  audio.sfxPickup();
  const center = platform.x + platform.w / 2;
  for (let i = 0; i < 14; i++) {
    particles.push({
      x: center,
      y: platform.y + 24,
      vx: (Math.random() * 2 - 1) * 120,
      vy: (Math.random() * 2 - 1) * 120,
      life: 0.4 + Math.random() * 0.3,
      color: Math.random() < 0.5 ? '#6abf4b' : '#ffffff',
    });
  }
}

function crash(reason) {
  if (state === 'exploding' || state === 'lose') return;
  crashReason = (rocket.fuel <= 0 && reason === 'POUSO RUIM') ? 'SEM COMBUSTÍVEL' : reason;
  ballistic = false;
  state = 'exploding';
  explodeTimer = 1.3;
  audio.setThrust(false);
  audio.sfxExplosion();
  const colors = ['#f7dd2f', '#ffb020', '#ff4020', '#ffffff'];
  for (let i = 0; i < 46; i++) {
    particles.push({
      x: rocket.x,
      y: rocket.y,
      vx: (Math.random() * 2 - 1) * 170,
      vy: (Math.random() * 2 - 1) * 170 + 50,
      life: 0.6 + Math.random() * 0.7,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
}

function spawnThrustParticles() {
  const nozzleX = rocket.x - Math.sin(rocket.angle) * 18;
  const nozzleY = rocket.y - Math.cos(rocket.angle) * 18;
  const colors = getActiveTrailColors();
  for (let i = 0; i < 2; i++) {
    thrustParticles.push({
      x: nozzleX,
      y: nozzleY,
      vx: rocket.vx - Math.sin(rocket.angle) * 90 + (Math.random() * 2 - 1) * 30,
      vy: rocket.vy - Math.cos(rocket.angle) * 90 + (Math.random() * 2 - 1) * 30,
      life: 0.3 + Math.random() * 0.2,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
}

function updateThrustParticles(dt) {
  for (const p of thrustParticles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  }
  thrustParticles = thrustParticles.filter(p => p.life > 0);
}

function updateObstacles(dt) {
  for (const o of obstacles) {
    o.x += o.dir * o.speed * dt;
    if (o.dir > 0 && o.x > W + 40) o.x = -40;
    if (o.dir < 0 && o.x < -40) o.x = W + 40;
    if (!o.soundPlayed && Math.abs(obstacleY(o) - rocket.y) < 220) {
      if (o.type === 'dog') { audio.sfxBark(); o.soundPlayed = true; }
      else if (o.type === 'dentist') { audio.sfxDrill(); o.soundPlayed = true; }
    }
  }
}

function obstacleY(o) {
  return o.y + (o.bobAmp ? Math.sin(time * 1.6 + o.bobPhase) * o.bobAmp : 0);
}

// ---------------------------------------------------------------- hazards
// Cometas e raios solares atravessam a tela rápido e somem. Diferente dos
// obstáculos (presos ao mundo), vivem em espaço de tela: cruzam a viewport
// independentemente do scroll da câmera.

function spawnComet() {
  const edge = Math.random();
  let x, y, vx, vy;
  if (edge < 0.5) {            // vem de cima
    x = Math.random() * W; y = -40;
    vx = (Math.random() * 2 - 1) * 260; vy = 420 + Math.random() * 200;
  } else if (edge < 0.75) {    // vem da esquerda
    x = -40; y = Math.random() * H * 0.65;
    vx = 430 + Math.random() * 190; vy = -90 + Math.random() * 350;
  } else {                     // vem da direita
    x = W + 40; y = Math.random() * H * 0.65;
    vx = -(430 + Math.random() * 190); vy = -90 + Math.random() * 350;
  }
  hazards.push({ type: 'comet', phase: 'active', x, y, vx, vy, radius: 12, trail: [] });
}

function spawnFlare() {
  // raio solar disparado de longe: telegrafa no canto direito antes de cruzar
  const y = 90 + Math.random() * (H - 180);
  hazards.push({
    type: 'flare', phase: 'warning', x: W + 6, y,
    vx: -(560 + Math.random() * 200), vy: (Math.random() * 2 - 1) * 30,
    radius: 10, warnTimer: 0.55, trail: [],
  });
}

function updateHazards(dt) {
  const diff = DIFFICULTIES[currentDiff];
  const rx = rocket.x, ry = sy(rocket.y);

  cometTimer -= dt;
  if (cometTimer <= 0) {
    spawnComet();
    cometTimer = diff.cometMin + Math.random() * (diff.cometMax - diff.cometMin);
  }
  flareTimer -= dt;
  if (flareTimer <= 0) {
    spawnFlare();
    flareTimer = diff.flareMin + Math.random() * (diff.flareMax - diff.flareMin);
  }

  for (let i = hazards.length - 1; i >= 0; i--) {
    const h = hazards[i];
    if (h.phase === 'warning') {
      h.warnTimer -= dt;
      if (h.warnTimer <= 0) h.phase = 'active';
      continue;
    }
    h.trail.push({ x: h.x, y: h.y });
    if (h.trail.length > 8) h.trail.shift();
    h.x += h.vx * dt;
    h.y += h.vy * dt;

    if (state === 'playing' && !rocket.landed) {
      const dx = h.x - rx, dy = h.y - ry;
      if (dx * dx + dy * dy < (h.radius + CONFIG.rocketRadius * 0.8) ** 2) {
        crash(h.type === 'comet' ? 'ATINGIDO POR UM COMETA' : 'ATINGIDO POR UM RAIO SOLAR');
        return;
      }
    }

    if (h.x < -80 || h.x > W + 80 || h.y < -80 || h.y > H + 80) hazards.splice(i, 1);
  }
}

function drawHazards() {
  for (const h of hazards) {
    if (h.type === 'flare' && h.phase === 'warning') {
      const pulse = 0.4 + 0.5 * Math.abs(Math.sin(time * 12));
      ctx.save();
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#ff9d3d';
      ctx.beginPath(); ctx.arc(h.x, h.y, 16, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#ffd94a';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(h.x, h.y, 22, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
      continue;
    }
    // rastro
    for (let i = 0; i < h.trail.length; i++) {
      const t = h.trail[i];
      const a = (i / h.trail.length) * 0.5;
      ctx.fillStyle = h.type === 'comet' ? 'rgba(160,200,255,' + a.toFixed(2) + ')' : 'rgba(255,160,60,' + a.toFixed(2) + ')';
      ctx.beginPath(); ctx.arc(t.x, t.y, h.radius * (0.3 + 0.5 * (i / h.trail.length)), 0, Math.PI * 2); ctx.fill();
    }
    // brilho externo
    ctx.fillStyle = h.type === 'comet' ? 'rgba(140,190,255,0.5)' : 'rgba(255,150,50,0.55)';
    ctx.beginPath(); ctx.arc(h.x, h.y, h.radius * 1.7, 0, Math.PI * 2); ctx.fill();
    // núcleo
    ctx.fillStyle = h.type === 'comet' ? '#dfeaff' : '#fff1c2';
    ctx.beginPath(); ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2); ctx.fill();
  }
}

function updatePlaying(dt) {
  updateObstacles(dt);
  updateHazards(dt);
  if (state !== 'playing') return; // updateHazards pode disparar crash()
  const activeStats = getActiveStats();

  if (rocket.landed) {
    audio.setThrust(false);
    if (keys.up && rocket.fuel > 0) {
      rocket.landed = false;
      rocket.vy = 10;
    } else {
      return;
    }
  }

  if (ballistic) {
    rocket.angle -= rocket.angle * Math.min(1, activeStats.autoStabilizeRate * dt);
  } else {
    if (keys.left) rocket.angle -= activeStats.rotationSpeed * dt;
    if (keys.right) rocket.angle += activeStats.rotationSpeed * dt;
    if (!keys.left && !keys.right) {
      rocket.angle -= rocket.angle * Math.min(1, activeStats.autoStabilizeRate * dt);
    }
  }
  rocket.angle = normalizeAngle(rocket.angle);

  const thrusting = !ballistic && keys.up && rocket.fuel > 0;
  if (thrusting) {
    rocket.vx += Math.sin(rocket.angle) * CONFIG.thrust * dt;
    rocket.vy += Math.cos(rocket.angle) * CONFIG.thrust * dt;
    rocket.fuel = Math.max(0, rocket.fuel - CONFIG.fuelBurnPerSecond * dt);
    spawnThrustParticles();
  }
  audio.setThrust(thrusting);
  rocket.vy -= CONFIG.gravity * dt;
  rocket.vx -= rocket.vx * CONFIG.drag * dt;
  rocket.vy -= rocket.vy * CONFIG.drag * dt;
  if (rocket.vy < -CONFIG.maxFallSpeed) rocket.vy = -CONFIG.maxFallSpeed;

  const prevBottom = rocket.y - CONFIG.rocketHalfHeight;
  rocket.x += rocket.vx * dt;
  rocket.y += rocket.vy * dt;

  if (rocket.x < CONFIG.wallMargin) { rocket.x = CONFIG.wallMargin; rocket.vx = Math.max(0, rocket.vx); }
  if (rocket.x > W - CONFIG.wallMargin) { rocket.x = W - CONFIG.wallMargin; rocket.vx = Math.min(0, rocket.vx); }
  if (rocket.y > worldTop) { rocket.y = worldTop; rocket.vy = Math.min(0, rocket.vy); }

  const newBottom = rocket.y - CONFIG.rocketHalfHeight;

  if (ballistic) {
    const dxMoon = rocket.x - moon.x;
    const dyMoon = rocket.y - moon.y;
    const hitDist = CONFIG.moonHitRadius + CONFIG.rocketRadius;
    if (dxMoon * dxMoon + dyMoon * dyMoon <= hitDist * hitDist) {
      moonImpactWin();
      return;
    }
    if (rocket.vy < 0 && rocket.y < platforms[platforms.length - 1].y + 60) {
      ballistic = false;
      addToast('ERROU! CONTROLE RESTAURADO');
    }
  }

  const targetPlatform = platforms[targetIndex];
  if (!targetPlatform.isPlanet && !targetPlatform.lemonCollected) {
    const lemonX = targetPlatform.x + targetPlatform.w / 2;
    const lemonY = targetPlatform.y + 24;
    const dx = rocket.x - lemonX;
    const dy = rocket.y - lemonY;
    const reach = CONFIG.rocketRadius + 20;
    if (dx * dx + dy * dy < reach * reach) collectLemon(targetPlatform);
  }

  updateCoinCollisions();

  for (let i = 0; i < platforms.length; i++) {
    if (i > targetIndex) continue; // locked platforms are intangible
    const p = platforms[i];
    const centerOverPad = Math.abs(rocket.x - (p.x + p.w / 2)) <= p.w / 2;
    if (rocket.vy <= 0 && prevBottom >= p.y - 2 && newBottom <= p.y && centerOverPad) {
      if (landingOk()) land(p);
      else crash('POUSO RUIM');
      return;
    }
    const boxOverlap = rocket.x + 8 > p.x && rocket.x - 8 < p.x + p.w &&
                       rocket.y - CONFIG.rocketHalfHeight < p.y && rocket.y + CONFIG.rocketHalfHeight > p.y - 12;
    if (boxOverlap) {
      crash('POUSO RUIM');
      return;
    }
  }

  if (newBottom <= 0) {
    if (landingOk()) land(null);
    else crash('POUSO RUIM');
    return;
  }

  for (const o of obstacles) {
    const dx = rocket.x - o.x;
    const dy = rocket.y - obstacleY(o);
    const minDist = CONFIG.rocketRadius + o.radius;
    if (dx * dx + dy * dy < minDist * minDist) {
      crash(OBSTACLE_TYPES[o.type].reason);
      return;
    }
  }
}

// top arc of the BIG moon shown in the win scene, anchored at the small moon's position
function moonSurfaceAt(x) {
  const dx = x - moon.x;
  if (Math.abs(dx) >= MOON_RADIUS) return -Infinity;
  return moon.y - (MOON_RADIUS - Math.sqrt(MOON_RADIUS * MOON_RADIUS - dx * dx));
}

function updateCelebration(dt) {
  if (winTime < 5) {
    for (let i = 0; i < 2; i++) {
      confetti.push({
        x: Math.random() * W,
        y: camY + H + 10,
        vx: (Math.random() * 2 - 1) * 40,
        vy: -(60 + Math.random() * 60),
        phase: Math.random() * Math.PI * 2,
        color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      });
    }
    if (Math.random() < 0.08 && lemonRain.length < 40) {
      lemonRain.push({
        x: 20 + Math.random() * (W - 40),
        y: camY + H + 20,
        vy: -(80 + Math.random() * 60),
        spin: (Math.random() * 2 - 1) * 4,
        angle: Math.random() * Math.PI * 2,
        rest: false,
      });
    }
  }
  for (const c of confetti) {
    c.x += (c.vx + Math.sin(time * 3 + c.phase) * 30) * dt;
    c.y += c.vy * dt;
  }
  confetti = confetti.filter(c => c.y > moonSurfaceAt(c.x) && c.y > camY - 40);
  for (const l of lemonRain) {
    if (l.rest) continue;
    l.y += l.vy * dt;
    l.angle += l.spin * dt;
    const surface = moonSurfaceAt(l.x);
    if (l.y <= surface + 6) {
      l.y = surface + 6;
      l.rest = true;
    }
  }
  lemonRain = lemonRain.filter(l => l.rest || l.y > camY - 40);
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy -= 120 * dt;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
}

function update(dt) {
  // congela animações do mundo enquanto pausado / na contagem de retomada
  if (state !== 'paused' && state !== 'resuming') time += dt;
  for (const t of toasts) t.t -= dt;
  toasts = toasts.filter(t => t.t > 0);
  updateThrustParticles(dt);

  if (state === 'playing') {
    updatePlaying(dt);
  } else if (state === 'slingshot') {
    updateObstacles(dt);
    updateHazards(dt);
    slingBanner -= dt;
    if (keys.left) slingAngle -= 1.2 * dt;
    if (keys.right) slingAngle += 1.2 * dt;
    slingAngle = Math.max(-1.0, Math.min(1.0, slingAngle));
    if (keys.up) slingPower += 0.7 * dt;
    if (keys.down) slingPower -= 0.7 * dt;
    slingPower = Math.max(0.25, Math.min(1, slingPower));
    const pull = slingPower * 26;
    rocket.angle = slingAngle;
    rocket.x = slingPad.x + slingPad.w / 2 - Math.sin(slingAngle) * pull;
    rocket.y = slingPad.y + 34 - Math.cos(slingAngle) * pull;
  } else if (state === 'exploding') {
    updateObstacles(dt);
    updateHazards(dt);
    updateParticles(dt);
    explodeTimer -= dt;
    if (explodeTimer <= 0) {
      pickDeathQuote();
      state = 'lose';
    }
  } else if (state === 'win') {
    winTime += dt;
    updateObstacles(dt);
    updateHazards(dt);
    updateParticles(dt);
    updateCelebration(dt);
  } else if (state === 'lose') {
    updateObstacles(dt);
    updateHazards(dt);
    updateParticles(dt);
  } else if (state === 'resuming') {
    // jogo congelado durante a contagem regressiva antes de retomar
    const before = Math.ceil(resumeTimer);
    resumeTimer -= dt;
    const after = Math.ceil(resumeTimer);
    if (after < before && after >= 1) audio.sfxCountdownTick();
    if (resumeTimer <= 0) { audio.sfxCountdownGo(); state = stateBeforePause; }
  }

  if (state === 'playing' || state === 'slingshot' || state === 'exploding' || state === 'win' || state === 'lose') {
    const slingScene = state === 'slingshot' || (state === 'playing' && ballistic);
    const targetCam = slingScene
      ? platforms[platforms.length - 1].y - 100
      : Math.max(-60, Math.min(rocket.y - H * 0.45, worldTop - H + 40));
    camY += (targetCam - camY) * Math.min(1, dt * 5);
  }
}

// ---------------------------------------------------------------- render

function sy(worldY) {
  return H - (worldY - camY);
}

function lerpColor(c1, c2, t) {
  const a = parseInt(c1.slice(1), 16);
  const b = parseInt(c2.slice(1), 16);
  const r = Math.round(((a >> 16) & 255) + (((b >> 16) & 255) - ((a >> 16) & 255)) * t);
  const g = Math.round(((a >> 8) & 255) + (((b >> 8) & 255) - ((a >> 8) & 255)) * t);
  const bl = Math.round((a & 255) + ((b & 255) - (a & 255)) * t);
  return 'rgb(' + r + ',' + g + ',' + bl + ')';
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawVignette() {
  const gradient = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.75);
  gradient.addColorStop(0, 'rgba(0,0,0,0)');
  gradient.addColorStop(1, 'rgba(0,0,0,0.38)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);
}

function drawSpriteCentered(sprite, x, y, scale, alpha) {
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.drawImage(sprite, x - sprite.width * scale / 2, y - sprite.height * scale / 2, sprite.width * scale, sprite.height * scale);
  ctx.globalAlpha = 1;
}

function roleBadge(role) {
  if (role === 'PRODUTO') return 'P';
  if (role === 'DADOS') return 'A';
  return 'D';
}

function loadAvatars() {
  return Promise.all(CHAR_KEYS.map(key => new Promise(resolve => {
    const img = new Image();
    img.onload = () => { avatarSprites[key] = img; resolve(); };
    img.onerror = () => resolve();
    img.src = CHARACTERS[key].avatar;
  }))).then(() => { avatarsReady = true; });
}

function drawPixelAvatar(key, x, y, size, highlight) {
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  if (highlight) {
    ctx.shadowColor = 'rgba(255,209,102,0.55)';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = 'rgba(255,209,102,0.85)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x - 1, y - 1, size + 2, size + 2);
    ctx.shadowBlur = 0;
  }
  const img = avatarSprites[key];
  if (img) {
    ctx.drawImage(img, x, y, size, size);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(x, y, size, size);
    ctx.strokeStyle = 'rgba(120,160,255,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, size, size);
    ctx.font = 'bold ' + Math.round(size * 0.45) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#8fa3c8';
    ctx.fillText(roleBadge(CHARACTERS[key].role), x + size / 2, y + size / 2);
  }
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

function drawMenuAvatar(key, x, y, size, selected, pulse) {
  const r = 12;
  const img = avatarSprites[key];

  ctx.save();
  if (selected) {
    ctx.shadowColor = 'rgba(255,209,102,0.45)';
    ctx.shadowBlur = 6 + (pulse || 0) * 6;
  }

  ctx.fillStyle = selected ? 'rgba(255,209,102,0.12)' : 'rgba(255,255,255,0.05)';
  roundRect(x - 3, y - 3, size + 6, size + 6, r + 3);
  ctx.fill();
  ctx.strokeStyle = selected ? 'rgba(255,209,102,0.85)' : 'rgba(255,255,255,0.14)';
  ctx.lineWidth = selected ? 2 : 1;
  roundRect(x - 3, y - 3, size + 6, size + 6, r + 3);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.save();
  roundRect(x, y, size, size, r);
  ctx.clip();
  ctx.imageSmoothingEnabled = false;
  if (img) {
    ctx.drawImage(img, x, y, size, size);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(x, y, size, size);
    ctx.font = 'bold ' + Math.round(size * 0.45) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#8fa3c8';
    ctx.fillText(roleBadge(CHARACTERS[key].role), x + size / 2, y + size / 2);
  }
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

function drawBackground(camPos) {
  const progress = Math.max(0, Math.min(1, camPos / Math.max(1, worldTop - H)));
  const top = lerpColor('#0d1330', '#04030c', progress);
  const bottom = lerpColor('#1a2450', '#0a0c22', progress);
  const gradient = ctx.createLinearGradient(0, 0, 0, H);
  gradient.addColorStop(0, top);
  gradient.addColorStop(1, bottom);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  for (const n of NEBULAE) {
    const span = H + 400;
    const yy = (((n.y - camPos * 0.15) % span) + span) % span - 200;
    const glow = ctx.createRadialGradient(n.x, yy, 0, n.x, yy, n.r);
    glow.addColorStop(0, 'rgba(' + n.color + ',0.10)');
    glow.addColorStop(1, 'rgba(' + n.color + ',0)');
    ctx.fillStyle = glow;
    ctx.fillRect(n.x - n.r, yy - n.r, n.r * 2, n.r * 2);
  }

  for (const s of stars) {
    const yy = (((s.y - camPos * s.parallax) % H) + H) % H;
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(time * 2 + s.twinkle);
    ctx.fillStyle = '#cfe3ff';
    ctx.fillRect(s.x, yy, s.size, s.size);
  }
  ctx.globalAlpha = 1;
}

function drawGround() {
  const groundY = sy(0);
  if (groundY > H + 60) return;
  ctx.fillStyle = '#2c4a28';
  ctx.fillRect(0, groundY, W, Math.max(0, H - groundY) + 60);
  ctx.fillStyle = '#1e3319';
  ctx.fillRect(0, groundY + 14, W, Math.max(0, H - groundY) + 60);
  ctx.fillStyle = '#ffd166';
  for (let i = 0; i < 14; i++) {
    const lx = (i * 137 + 40) % W;
    if (Math.abs(lx - W / 2) > 60) ctx.fillRect(lx, groundY + 22 + (i % 3) * 9, 2, 2);
  }
  // launch pad
  ctx.fillStyle = '#242c40';
  ctx.fillRect(W / 2 - 40, groundY - 2, 80, 8);
  ctx.shadowColor = '#41e0d0';
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#41e0d0';
  ctx.fillRect(W / 2 - 40, groundY - 4, 80, 3);
  ctx.shadowBlur = 0;
  // estruturas da base de lançamento
  drawLaunchTower(groundY);
  drawFuelTank(groundY);
}

// torre de serviço (gantry) treliçada à direita do pad
function drawLaunchTower(groundY) {
  const towerH = 108;
  const topY = groundY - towerH;
  const legBotL = W / 2 + 48, legBotR = W / 2 + 78;
  const legTopL = W / 2 + 54, legTopR = W / 2 + 72;
  ctx.save();
  ctx.strokeStyle = '#6b7488';
  ctx.lineWidth = 2;
  // pernas afuniladas
  ctx.beginPath();
  ctx.moveTo(legBotL, groundY); ctx.lineTo(legTopL, topY);
  ctx.moveTo(legBotR, groundY); ctx.lineTo(legTopR, topY);
  ctx.stroke();
  // travessas + diagonais (treliça)
  const rungs = 7;
  for (let i = 0; i <= rungs; i++) {
    const t = i / rungs, t2 = (i + 1) / rungs;
    const y = groundY + (topY - groundY) * t;
    const xl = legBotL + (legTopL - legBotL) * t;
    const xr = legBotR + (legTopR - legBotR) * t;
    ctx.beginPath(); ctx.moveTo(xl, y); ctx.lineTo(xr, y); ctx.stroke();
    if (i < rungs) {
      const y2 = groundY + (topY - groundY) * t2;
      const xl2 = legBotL + (legTopL - legBotL) * t2;
      const xr2 = legBotR + (legTopR - legBotR) * t2;
      ctx.beginPath();
      if (i % 2 === 0) { ctx.moveTo(xl, y); ctx.lineTo(xr2, y2); }
      else { ctx.moveTo(xr, y); ctx.lineTo(xl2, y2); }
      ctx.stroke();
    }
  }
  // braço de serviço apontando para o foguete
  const armY = topY + 18;
  ctx.strokeStyle = '#7d8698';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(legTopL, armY);
  ctx.lineTo(W / 2 + 14, armY);
  ctx.stroke();
  // plataforma no topo
  ctx.fillStyle = '#39404f';
  ctx.fillRect(legTopL - 3, topY - 4, (legTopR - legTopL) + 6, 5);
  // farol vermelho piscando
  const beaconOn = Math.floor(time * 2) % 2 === 0;
  if (beaconOn) { ctx.shadowColor = '#ff5b5b'; ctx.shadowBlur = 8; }
  ctx.fillStyle = beaconOn ? '#ff5b5b' : '#5a1f1f';
  ctx.fillRect((legTopL + legTopR) / 2 - 2, topY - 9, 4, 4);
  ctx.shadowBlur = 0;
  ctx.restore();
}

// tanque de combustível à esquerda do pad
function drawFuelTank(groundY) {
  const tankX = W / 2 - 92, tankW = 26, tankH = 40;
  ctx.save();
  ctx.fillStyle = '#c9cdd6';
  roundRect(tankX, groundY - tankH, tankW, tankH, 8);
  ctx.fill();
  ctx.fillStyle = '#9aa1ae';
  ctx.fillRect(tankX, groundY - tankH * 0.55, tankW, 3);
  ctx.fillRect(tankX, groundY - tankH * 0.3, tankW, 3);
  // faixa de aviso
  ctx.fillStyle = '#ffd166';
  ctx.fillRect(tankX, groundY - tankH - 4, tankW, 4);
  // cano ligando ao pad
  ctx.strokeStyle = '#7d8698';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(tankX + tankW, groundY - 8);
  ctx.lineTo(W / 2 - 40, groundY - 8);
  ctx.stroke();
  ctx.restore();
}

function drawBigMoon() {
  const surfaceY = sy(moon.y);
  if (surfaceY < -420) return;
  const cx = moon.x;
  const cy = surfaceY + MOON_RADIUS;
  if (moonImgReady) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, MOON_RADIUS, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(moonImg, cx - MOON_RADIUS, cy - MOON_RADIUS, MOON_RADIUS * 2, MOON_RADIUS * 2);
    const shade = ctx.createRadialGradient(cx + MOON_RADIUS * 0.3, cy + MOON_RADIUS * 0.3, MOON_RADIUS * 0.15, cx, cy, MOON_RADIUS * 1.25);
    shade.addColorStop(0, 'rgba(0,0,0,0)');
    shade.addColorStop(0.7, 'rgba(0,0,10,0.1)');
    shade.addColorStop(1, 'rgba(0,0,10,0.48)');
    ctx.fillStyle = shade;
    ctx.fillRect(cx - MOON_RADIUS, cy - MOON_RADIUS, MOON_RADIUS * 2, MOON_RADIUS * 2);
    ctx.restore();
    return;
  }
  ctx.shadowColor = '#aebbdd';
  ctx.shadowBlur = 46;
  ctx.fillStyle = '#cfd3d9';
  ctx.beginPath();
  ctx.arc(cx, cy, MOON_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aab0ba';
  const craters = [[-160, 60, 26], [-60, 130, 38], [90, 80, 22], [170, 160, 30], [10, 40, 12]];
  for (const [dx, dy, r] of craters) {
    ctx.beginPath();
    ctx.arc(cx + dx, cy + dy - MOON_RADIUS + 90, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawSmallMoon() {
  const y = sy(moon.y);
  if (y < -40 || y > H + 40) return;
  ctx.shadowColor = '#cfd3d9';
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#cfd3d9';
  ctx.beginPath();
  ctx.arc(moon.x, y, CONFIG.moonHitRadius, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aab0ba';
  ctx.beginPath();
  ctx.arc(moon.x - 6, y - 4, 4, 0, Math.PI * 2);
  ctx.arc(moon.x + 5, y + 6, 3, 0, Math.PI * 2);
  ctx.fill();
  if (state === 'slingshot' || ballistic) {
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#cfe3ff';
    ctx.fillText('LUA', moon.x, y - 30);
    ctx.textAlign = 'left';
  }
}

function drawPlanet(p, index) {
  const topY = sy(p.y);
  if (topY < -130 || topY > H + 130) return;
  const tangible = index <= targetIndex;
  const isTarget = index === targetIndex;
  const cx = p.x + p.w / 2;
  const cy = topY + 42;
  ctx.globalAlpha = tangible ? 1 : 0.2;
  ctx.strokeStyle = '#c9a86a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 62, 14, -0.25, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#3aa6a0';
  ctx.beginPath();
  ctx.arc(cx, cy, 42, 0, Math.PI * 2);
  ctx.fill();
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, 42, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = '#2e837e';
  ctx.fillRect(cx - 42, cy - 8, 84, 7);
  ctx.fillRect(cx - 42, cy + 12, 84, 6);
  ctx.restore();
  // landing strip
  const pulse = 0.6 + 0.4 * Math.sin(time * 5);
  const edgeColor = isTarget ? '#ffd166' : '#41e0d0';
  ctx.shadowColor = edgeColor;
  ctx.shadowBlur = isTarget ? 14 * pulse : 6;
  ctx.fillStyle = edgeColor;
  ctx.fillRect(p.x, topY, p.w, 3);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function drawLemons() {
  for (let i = 0; i < platforms.length - 1; i++) {
    const p = platforms[i];
    if (p.lemonCollected) continue;
    const y = sy(p.y + 24) + Math.sin(time * 2.5 + i) * 4;
    if (y < -30 || y > H + 30) continue;
    const x = p.x + p.w / 2;
    const active = i === targetIndex;
    ctx.globalAlpha = active ? 1 : 0.25;
    if (active) {
      ctx.shadowColor = '#6abf4b';
      ctx.shadowBlur = 14;
    }
    ctx.drawImage(SPRITES.lemon, x - 9, y - 7, 18, 14);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function drawCelebration() {
  for (const c of confetti) {
    ctx.fillStyle = c.color;
    ctx.fillRect(c.x - 2, sy(c.y) - 2, 4, 4);
  }
  for (const l of lemonRain) {
    ctx.save();
    ctx.translate(l.x, sy(l.y));
    ctx.rotate(l.angle);
    ctx.drawImage(SPRITES.lemon, -7, -6, 14, 11);
    ctx.restore();
  }
}

function drawWinScene() {
  const dir = rocket.x < W - 110 ? 1 : -1;
  if (winTime < 0.6) return;
  const startX = rocket.x + 16 * dir;
  const endX = rocket.x + 56 * dir;
  const walkT = Math.max(0, Math.min(1, (winTime - 0.6) / 1.4));
  const ax = startX + (endX - startX) * walkT;
  const feetY = sy(moonSurfaceAt(ax));
  const bob = walkT < 1 ? Math.abs(Math.sin(winTime * 10)) * 2 : 0;
  ctx.drawImage(SPRITES.astronaut, ax - 8, feetY - 24 - bob, 16, 24);
  if (winTime > 2.2) {
    const poleHeight = Math.min(1, (winTime - 2.2) / 0.5) * 32;
    const poleX = ax + 16 * dir;
    const poleBaseY = sy(moonSurfaceAt(poleX));
    ctx.fillStyle = '#e8ecf4';
    ctx.fillRect(poleX, poleBaseY - poleHeight, 2, poleHeight);
    if (poleHeight >= 32) {
      const flagX = dir > 0 ? poleX + 2 : poleX - 26;

function drawPlatform(p, index) {
  const y = sy(p.y);
  if (y < -40 || y > H + 40) return;
  const tangible = index <= targetIndex;
  const isTarget = index === targetIndex;
  ctx.globalAlpha = tangible ? 1 : 0.2;
  ctx.fillStyle = '#242c40';
  ctx.fillRect(p.x, y + 2, p.w, 8);
  ctx.fillStyle = '#161c2c';
  ctx.fillRect(p.x + 6, y + 10, 4, 9);
  ctx.fillRect(p.x + p.w - 10, y + 10, 4, 9);
  const pulse = 0.6 + 0.4 * Math.sin(time * 5);
  const edgeColor = isTarget ? '#ffd166' : '#41e0d0';
  ctx.shadowColor = edgeColor;
  ctx.shadowBlur = isTarget ? 14 * pulse : 6;
  ctx.fillStyle = edgeColor;
  ctx.fillRect(p.x, y, p.w, 3);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function drawObstacles() {
  for (const o of obstacles) {
    const y = sy(obstacleY(o));

function drawSlingshotRig() {

  const padY = sy(slingPad.y);

  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(centerX, padY);
  ctx.lineTo(centerX, forkY);
  ctx.moveTo(centerX, forkY);
  ctx.lineTo(centerX - 12, forkY - 14);
  ctx.moveTo(centerX, forkY);
  ctx.lineTo(centerX + 12, forkY - 14);
  ctx.stroke();
  // elastic bands to the rocket tail
  const tailX = rocket.x - Math.sin(rocket.angle) * 16;
  const tailY = sy(rocket.y - Math.cos(rocket.angle) * 16);
  ctx.strokeStyle = '#c2455a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(centerX - 12, forkY - 14);
  ctx.lineTo(tailX, tailY);
  ctx.lineTo(centerX + 12, forkY - 14);

function drawSlingshotUI() {
  // trajectory preview
  let px = slingPad.x + slingPad.w / 2;
  let py = slingPad.y + 34;
  const speed = slingPower * CONFIG.slingMaxSpeed;
  let vx = Math.sin(slingAngle) * speed;
  let vy = Math.cos(slingAngle) * speed;
  const dt = 1 / 30;
  const hitDist = CONFIG.moonHitRadius + CONFIG.rocketRadius;
  for (let i = 0; i < 90; i++) {
    vx -= vx * CONFIG.drag * dt;
    vy -= (CONFIG.gravity + vy * CONFIG.drag) * dt;
    px += vx * dt;
    py += vy * dt;
    const dxMoon = px - moon.x;
    const dyMoon = py - moon.y;
    if (dxMoon * dxMoon + dyMoon * dyMoon <= hitDist * hitDist) break;
    if (px < CONFIG.wallMargin || px > W - CONFIG.wallMargin) break;
    if (py < slingPad.y) break;
    if (i % 3 === 0) {
      ctx.globalAlpha = 0.8 * (1 - i / 90);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(px - 1.5, sy(py) - 1.5, 3, 3);
    }
  }
  ctx.globalAlpha = 1;
  drawCenteredText([
    [isMobile ? 'TOQUE E ARRASTE O FOGUETE PRA TRÁS E SOLTE' : 'ARRASTE O FOGUETE PRA TRÁS E SOLTE', 622, 12, '#cfe3ff'],
    ['ACERTE A LUA!', 644, 14, '#ffd166', true],
    [isMobile ? '(TOQUE E ARRASTE)' : '(OU MIRE COM SETAS + ESPAÇO)', 668, 10, '#8892a6'],
  ]);
}

function drawCenteredText(lines) {
  ctx.textAlign = 'center';
  for (const [text, y, size, color, glow] of lines) {
    ctx.font = 'bold ' + size + 'px monospace';
    ctx.fillStyle = color;
    if (glow) {
      ctx.shadowColor = color;
      ctx.shadowBlur = 18;
    }
    ctx.fillText(text, W / 2, y);
    ctx.shadowBlur = 0;
  }
  ctx.textAlign = 'left';
}

function wrapTextLines(text, maxWidth, font) {
  ctx.font = font;
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function truncateText(text, maxWidth, font) {
  ctx.font = font;
  if (ctx.measureText(text).width <= maxWidth) return text;
  let trimmed = text;
  while (trimmed.length > 0 && ctx.measureText(trimmed + '...').width > maxWidth) {
    trimmed = trimmed.slice(0, -1);
  }
  return trimmed + '...';
}

function drawWrappedText(text, x, y, maxWidth, font, color, lineHeight, maxLines) {
  let lines = wrapTextLines(text, maxWidth, font);
  if (maxLines && lines.length > maxLines) {
    lines = lines.slice(0, maxLines);
    lines[maxLines - 1] = truncateText(lines[maxLines - 1], maxWidth, font);
  }
  ctx.font = font;
  ctx.fillStyle = color;
  ctx.textAlign = 'left';
  lines.forEach((line, i) => ctx.fillText(line, x, y + i * lineHeight));
  return lines.length;
}

function drawCenteredWrappedTextAt(text, centerX, y, maxWidth, font, color, lineHeight, maxLines) {
  let lines = wrapTextLines(text, maxWidth, font);
  if (maxLines && lines.length > maxLines) {
    lines = lines.slice(0, maxLines);
    lines[maxLines - 1] = truncateText(lines[maxLines - 1], maxWidth, font);
  }
  ctx.font = font;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  lines.forEach((line, i) => ctx.fillText(line, centerX, y + i * lineHeight));
  ctx.textAlign = 'left';
  return lines.length;
}

function drawCenteredWrappedText(text, y, maxWidth, font, color, lineHeight, maxLines) {
  return drawCenteredWrappedTextAt(text, W / 2, y, maxWidth, font, color, lineHeight, maxLines);
}

function countWrappedLines(text, maxWidth, font, maxLines) {
  let lines = wrapTextLines(text, maxWidth, font);
  if (maxLines && lines.length > maxLines) lines = lines.slice(0, maxLines);
  return lines.length;
}

function getCharacterMenuLayout() {
  const margin = 48;
  const gap = 24;
  const cols = 2;
  const rows = 2;
  const cardW = (W - margin * 2 - gap) / cols;
  const originX = margin;
  const originY = 165;
  const hintY = 680;
  const cardH = Math.floor((hintY - 20 - originY - gap) / rows);
  function cardRect(i) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    return {
      x: originX + col * (cardW + gap),
      y: originY + row * (cardH + gap),
      w: cardW,
      h: cardH,
    };
  }
  return { margin, gap, cols, rows, cardW, cardH, originX, originY, avatarSize: 120, padding: 16, cardRect };
}

function drawCharacterCard(key, rect, selected) {
  const ch = CHARACTERS[key];
  const { x, y, w, h } = rect;
  const layout = getCharacterMenuLayout();
  const pad = layout.padding;
  const pulse = selected ? 0.5 + 0.5 * Math.sin(time * 4) : 0;

  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, selected ? 'rgba(255,255,255,0.11)' : 'rgba(255,255,255,0.06)');
  grad.addColorStop(1, selected ? 'rgba(255,255,255,0.05)' : 'rgba(255,255,255,0.02)');
  ctx.fillStyle = grad;
  roundRect(x, y, w, h, 12);
  ctx.fill();

  if (selected) {
    ctx.save();
    ctx.shadowColor = 'rgba(255,209,102,0.45)';
    ctx.shadowBlur = 8 + pulse * 8;
    ctx.strokeStyle = 'rgba(255,209,102,0.85)';
    ctx.lineWidth = 2;
    roundRect(x, y, w, h, 12);
    ctx.stroke();
    ctx.restore();

    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    roundRect(x, y, w, h, 12);
    ctx.stroke();
  }

  const avatarSize = layout.avatarSize;
  const avatarY = y + (h - avatarSize) / 2;
  drawMenuAvatar(key, x + pad, avatarY, avatarSize, selected, pulse);

  const textAreaW = w - pad * 2 - avatarSize - 16;
  const textCenterX = x + pad + avatarSize + 16 + textAreaW / 2;
  const nameColor = selected ? '#ffffff' : '#8892a6';
  const descColor = selected ? '#cfe3ff' : '#5a6478';
  const nameFont = selected ? 'bold 16px monospace' : '16px monospace';
  const nameLineH = 18;
  const descLineH = 14;
  const roleLineH = 18;
  const nameLineCount = countWrappedLines(ch.label, textAreaW, nameFont, 2);
  const descLineCount = countWrappedLines(ch.desc, textAreaW, '12px monospace', 2);
  const textBlockH = nameLineCount * nameLineH + 6 + roleLineH + descLineCount * descLineH;
  const textStartY = y + (h - textBlockH) / 2;

  const nameLines = drawCenteredWrappedTextAt(ch.label, textCenterX, textStartY, textAreaW, nameFont, nameColor, nameLineH, 2);
  const roleY = textStartY + nameLines * nameLineH + 6;
  ctx.font = '13px monospace';
  const badgeW = 28;
  const roleW = ctx.measureText(ch.role).width;
  const roleTotalW = badgeW + roleW;
  const roleStartX = textCenterX - roleTotalW / 2;
  drawRoleBadge(ch.role, roleStartX, roleY, selected);
  ctx.textAlign = 'left';
  ctx.fillStyle = selected ? '#ffd166' : '#5a6478';
  ctx.fillText(ch.role, roleStartX + badgeW, roleY);
  drawCenteredWrappedTextAt(ch.desc, textCenterX, roleY + roleLineH, textAreaW, '12px monospace', descColor, descLineH, 2);
}

    ctx.globalAlpha = 1;
  }
  if (state === 'win') {
    drawWinScene();
    drawCelebration();
  }
  drawParticles();
  drawVignette();
  drawHUD();
  drawToasts();

  if (state === 'win' && winTime > 3.2) {
    ctx.fillStyle = 'rgba(10,14,30,0.82)';
    roundRect(60, 96, W - 120, 216, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,209,102,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
    drawCenteredText([
      ['VOCÊ CHEGOU', 148, 30, '#ffd166', true],
      ['NA LUA!', 186, 30, '#ffd166', true],
      ['TENTATIVAS: ' + attempts, 228, 14, '#cfe3ff'],
      ['MOEDAS: ' + wallet.coins, 252, 14, '#ffd166'],
      [isMobile ? 'TOQUE PARA REPETIR - METADE DE BAIXO: MENU' : 'CLIQUE: REPETIR · METADE DE BAIXO: MENU · R / ENTER', 284, 13, '#ffffff'],
    ]);
  } else if (state === 'lose') {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(10,14,30,0.85)';
    roundRect(60, 240, W - 120, 290, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(120,160,255,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
    drawCenteredText([
      ['EXPLODIU!', 280, 36, '#ff4d5e', true],
    ]);
    const quoteY = 320;
    const quoteFont = 'bold 12px monospace';
    const quoteLines = drawCenteredWrappedText(
      deathQuote, quoteY, 320, quoteFont, '#cfe3ff', 15
    );
    const reasonY = quoteY + quoteLines * 15 + 12;
    drawCenteredText([
      [crashReason, reasonY, 11, '#8fa3c8'],
      ['TENTATIVA ' + attempts, reasonY + 26, 13, '#8fa3c8'],
      ['MOEDAS: ' + wallet.coins, reasonY + 46, 13, '#ffd166'],
      [isMobile ? 'TOQUE PARA REPETIR - METADE DE BAIXO: MENU' : 'CLIQUE: REPETIR · METADE DE BAIXO: MENU · R / ENTER', reasonY + 74, 13, '#ffffff'],
    ]);
  }
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(6,10,22,0.68)';
  ctx.fillRect(0, 0, W, H);
  drawCenteredText([
    ['PAUSADO', H / 2 - 40, 46, '#ffd166', true],
    [isMobile ? 'TOQUE PARA CONTINUAR' : 'ENTER / ESC PARA CONTINUAR', H / 2 + 24, 14, '#cfe3ff'],
    [isMobile ? '' : 'Q PARA SAIR AO MENU', H / 2 + 54, 12, '#8892a6'],
  ]);
}

function drawResumeCountdown() {
  ctx.fillStyle = 'rgba(6,10,22,0.5)';
  ctx.fillRect(0, 0, W, H);
  const secondsLeft = Math.ceil(resumeTimer);
  // frase acima da contagem
  if (countdownLabel) {
    drawCenteredText([[countdownLabel, H / 2 - 90, 20, '#cfe3ff', true]]);
  }
  // pulso de escala conforme cada segundo passa
  const frac = resumeTimer - Math.floor(resumeTimer);
  const scale = 1 + frac * 0.4;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.translate(W / 2, H / 2);
  ctx.scale(scale, scale);
  ctx.font = 'bold 96px monospace';
  ctx.shadowColor = '#ffd166';
  ctx.shadowBlur = 24;
  ctx.fillStyle = '#ffd166';
  ctx.fillText(String(secondsLeft), 0, 34);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function render() {
  if (state === 'title') renderTitle();
  else if (state === 'character') renderCharacterMenu();
  else if (state === 'difficulty') renderMenu();
  else if (state === 'shop') renderShop();
  else renderWorld();
  if (state === 'paused') drawPauseOverlay();
  else if (state === 'resuming') drawResumeCountdown();
}

// ---------------------------------------------------------------- input

async function enableTilt() {
  neutralGamma = null;
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const result = await DeviceOrientationEvent.requestPermission();
      tiltEnabled = result === 'granted';
    } catch {
      tiltEnabled = false;
    }
  } else {
    tiltEnabled = true;
  }
}

window.addEventListener('deviceorientation', (e) => {
  if (!isMobile || !tiltEnabled || state !== 'playing' || ballistic) return;
  if (e.gamma == null) return;
  if (neutralGamma === null) neutralGamma = e.gamma;
  const delta = e.gamma - neutralGamma;
  keys.left = false;
  keys.right = false;
  if (delta < -TILT_DEAD_ZONE) keys.left = true;
  else if (delta > TILT_DEAD_ZONE) keys.right = true;
});

window.addEventListener('keydown', (e) => {
  if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
  audio.init();
  if (e.key === 'm' || e.key === 'M') { audio.toggleMute(); return; }

  if (state === 'title') {
    if (e.key === 'l' || e.key === 'L') { openShop('title'); return; }
    if (e.key === 'Enter' || e.key === ' ') { state = 'character'; menuIndex = 0; }
  } else if (state === 'character') {
    if ((e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') && !e.repeat) {
      menuIndex = CHAR_MENU_GRID_NAV[e.key][menuIndex];
    }
    else if (e.key === '1') menuIndex = 0;
    else if (e.key === '2') menuIndex = 1;
    else if (e.key === '3') menuIndex = 2;
    else if (e.key === '4') menuIndex = 3;
    else if (e.key === 'Enter' || e.key === ' ') {
      currentCharacter = CHAR_KEYS[menuIndex];
      state = 'difficulty';
      menuIndex = 0;
    } else if (e.key === 'l' || e.key === 'L') { openShop('character'); }
    else if (e.key === 'Escape' || e.key === 'Backspace') { audio.stopMusic(); audio.stopVictorySong(); state = 'title'; }
  } else if (state === 'shop') {
    const keys = getShopItemKeys();
    const cols = getShopLayout().cols;
    if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      if (!e.repeat) shopIndex = shopGridNav(e.key, shopIndex, keys.length, cols);
    } else if (e.key === 'q' || e.key === 'Q' || e.key === 'Tab') {
      shopTab = (shopTab + 2) % 3;
      shopIndex = 0;
    } else if (e.key === 'e' || e.key === 'E') {
      shopTab = (shopTab + 1) % 3;
      shopIndex = 0;
    } else if (e.key === 'Enter' || e.key === ' ') {
      handleShopConfirm();
    } else if (e.key === 'Escape') {
      leaveShop();
    } else if (e.key === 'Backspace') {
      audio.stopMusic(); audio.stopVictorySong(); state = 'title';
    }
  } else if (state === 'difficulty') {
    if (e.key === 'ArrowUp' && !e.repeat) menuIndex = (menuIndex + 2) % 3;
    else if (e.key === 'ArrowDown' && !e.repeat) menuIndex = (menuIndex + 1) % 3;
    else if (e.key === '1') menuIndex = 0;
    else if (e.key === '2') menuIndex = 1;
    else if (e.key === '3') menuIndex = 2;
    else if (e.key === 'Enter' || e.key === ' ') startGame(DIFF_KEYS[menuIndex], false);
    else if (e.key === 'Escape') { state = 'character'; menuIndex = CHAR_KEYS.indexOf(currentCharacter); }
  } else if (state === 'slingshot') {
    if (e.key === ' ' || e.key === 'Enter') launchSlingshot();
    else if (e.key === 'Escape') { audio.setThrust(false); state = 'character'; menuIndex = CHAR_KEYS.indexOf(currentCharacter); }
  } else if (state === 'win' || state === 'lose') {
    if (e.key === 'r' || e.key === 'R') startGame(currentDiff, true);
    else if (e.key === 'Enter' || e.key === 'Escape') { audio.stopMusic(); audio.stopVictorySong(); state = 'title'; }
  } else if (state === 'playing') {
    if (e.key === 'Escape') {
      audio.setThrust(false);
      keys.left = keys.right = keys.up = keys.down = false;
      stateBeforePause = 'playing';
      state = 'paused';
    }
  } else if (state === 'paused') {
    if (e.key === 'q' || e.key === 'Q') {
      audio.setThrust(false);
      state = 'character';
      menuIndex = CHAR_KEYS.indexOf(currentCharacter);
    } else if (e.key === 'Enter' || e.key === 'Escape' || e.key === ' ') {
      countdownLabel = 'RETOMANDO EM...';
      resumeTimer = 2;
      state = 'resuming';
      audio.sfxCountdownTick();
    }
  }

  if (e.key === 'ArrowLeft') keys.left = true;
  if (e.key === 'ArrowRight') keys.right = true;
  if (e.key === 'ArrowUp') keys.up = true;
  if (e.key === 'ArrowDown') keys.down = true;
});

function canvasPosFromClient(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top) * (H / rect.height),
  };
}

function canvasPos(e) {
  return canvasPosFromClient(e.clientX, e.clientY);
}

function handleMenuTap(x, y) {
  if (state === 'title') {
    const shopBtn = getTitleShopButtonRect();
    if (x >= shopBtn.x && x <= shopBtn.x + shopBtn.w && y >= shopBtn.y && y <= shopBtn.y + shopBtn.h) {
      openShop('title');
      return;
    }
    state = 'character';
    menuIndex = 0;
  } else if (state === 'character') {
    if (x >= 48 && x <= 140 && y >= 88 && y <= 108) {
      state = 'title';
      return;
    }
    if (x >= W - 160 && x <= W - 48 && y >= 88 && y <= 108) {
      openShop('character');
      return;
    }
    const layout = getCharacterMenuLayout();
    for (let i = 0; i < CHAR_KEYS.length; i++) {
      const r = layout.cardRect(i);
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        currentCharacter = CHAR_KEYS[i];
        state = 'difficulty';
        menuIndex = 0;
        return;
      }
    }
  } else if (state === 'shop') {
    handleShopTap(x, y);
  } else if (state === 'difficulty') {
    for (let i = 0; i < DIFF_KEYS.length; i++) {
      const cy = 260 + i * 90;
      if (x >= 90 && x <= W - 90 && y >= cy - 26 && y <= cy + 40) {
        startGame(DIFF_KEYS[i], false);
        return;
      }
    }
  } else if (state === 'win' || state === 'lose') {
    if (y > H / 2) {
      audio.stopMusic();
      audio.stopVictorySong();
      state = 'title';
    } else {
      startGame(currentDiff, true);
    }
  } else if (state === 'paused') {
    countdownLabel = 'RETOMANDO EM...';
    resumeTimer = 2;
    state = 'resuming';
    audio.sfxCountdownTick();
  }
}

function updateSlingshotDrag(clientX, clientY) {
  const m = canvasPosFromClient(clientX, clientY);
  const anchorX = slingPad.x + slingPad.w / 2;
  const anchorY = sy(slingPad.y + 34);
  const dx = m.x - anchorX;
  const dy = m.y - anchorY;
  if (dy <= 4) return;
  slingAngle = Math.max(-1.2, Math.min(1.2, Math.atan2(-dx, dy)));
  const pullDistance = Math.sqrt(dx * dx + dy * dy);
  slingPower = Math.max(0.25, Math.min(1, pullDistance / 90));
}

let touchStart = null;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  audio.init();
  const t = e.changedTouches[0];
  touchStart = { x: t.clientX, y: t.clientY };
  if (state === 'playing') keys.up = true;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (state === 'playing') {
    if (e.touches.length === 0) keys.up = false;
    touchStart = null;
    return;
  }
  if (state === 'slingshot' || dragging) {
    touchStart = null;
    return;
  }
  if (!touchStart) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  if (dx * dx + dy * dy > 400) {
    touchStart = null;
    return;
  }
  const m = canvasPos(t);
  handleMenuTap(m.x, m.y);
  touchStart = null;
}, { passive: false });

canvas.addEventListener('touchcancel', (e) => {
  if (state === 'playing' && e.touches.length === 0) keys.up = false;
  touchStart = null;
}, { passive: false });

canvas.addEventListener('click', (e) => {
  if (state === 'playing' || state === 'slingshot') return;
  audio.init();
  const m = canvasPos(e);
  handleMenuTap(m.x, m.y);
});

canvas.addEventListener('pointerdown', (e) => {
  if (state !== 'slingshot') return;
  const m = canvasPos(e);
  const dx = m.x - rocket.x;
  const dy = m.y - sy(rocket.y);
  if (dx * dx + dy * dy < 60 * 60) {
    dragging = true;
    canvas.setPointerCapture(e.pointerId);
  }
});

canvas.addEventListener('pointermove', (e) => {
  if (!dragging || state !== 'slingshot') return;
  updateSlingshotDrag(e.clientX, e.clientY);
});

canvas.addEventListener('pointerup', (e) => {
  if (!dragging) return;
  dragging = false;
  if (canvas.hasPointerCapture(e.pointerId)) canvas.releasePointerCapture(e.pointerId);
  if (state === 'slingshot') launchSlingshot();
});

window.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft') keys.left = false;
  if (e.key === 'ArrowRight') keys.right = false;
  if (e.key === 'ArrowUp') keys.up = false;
  if (e.key === 'ArrowDown') keys.down = false;
});

// ---------------------------------------------------------------- main loop

let lastTime = 0;
function frame(t) {
  const dt = Math.min((t - lastTime) / 1000, 1 / 30);
  lastTime = t;
  update(dt);
  render();
  requestAnimationFrame(frame);
}
loadSave();
requestAnimationFrame(frame);
loadAvatars();

// debug/test hooks
window.__rl = {
  CONFIG, DIFFICULTIES, startGame, update, render, keys, audio,
  isMobile, enableTilt,
  get tiltEnabled() { return tiltEnabled; },
  get neutralGamma() { return neutralGamma; },
  set neutralGamma(v) { neutralGamma = v; },
  get state() { return state; },
  set state(v) { state = v; },
  get rocket() { return rocket; },
  get platforms() { return platforms; },
  get obstacles() { return obstacles; },
  get targetIndex() { return targetIndex; },
  set targetIndex(v) { targetIndex = v; },
  get crashReason() { return crashReason; },
  get deathQuote() { return deathQuote; },
  get attempts() { return attempts; },
  get winTime() { return winTime; },
  get confetti() { return confetti; },
  get lemonRain() { return lemonRain; },
  get slingAngle() { return slingAngle; },
  set slingAngle(v) { slingAngle = v; },
  get slingPower() { return slingPower; },
  set slingPower(v) { slingPower = v; },
  get ballistic() { return ballistic; },
  get moon() { return moon; },
  get wallet() { return wallet; },
  get coins() { return coins; },
  resetWallet() {
    wallet = defaultWallet();
    saveWallet();
  },
  addCoins(n) {
    wallet.coins += n;
    wallet.totalEarned += n;
    saveWallet();
  },
  SHOP: { ROCKET_SKINS, TRAILS, ACCESSORIES, SKIN_KEYS, TRAIL_KEYS, ACCESSORY_KEYS },
  purchaseItem,
  equipItem,
  openShop,
  get equipped() { return wallet.equipped; },
  get inventory() { return wallet.inventory; },
  launchSlingshot,
};
</script>
