function makeSprite(rows, palette) {
  const h = rows.length;
  const w = rows[0].length;
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const g = canvas.getContext('2d');
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const color = palette[rows[y][x]];
      if (color) {
        g.fillStyle = color;
        g.fillRect(x, y, 1, 1);
      }
    }
  }
  return canvas;
}

// ---------------------------------------------------------------- audio

const audio = {
  ctx: null,
  master: null,
  thrustGain: null,
  muted: false,
  musicStep: 0,
  musicNextTime: 0,

  init() {
    if (this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    try {
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = this.muted ? 0 : 0.6;
      this.master.connect(this.ctx.destination);

      const seconds = 1;
      const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * seconds, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      const noise = this.ctx.createBufferSource();
      noise.buffer = buffer;
      noise.loop = true;
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 600;
      this.thrustGain = this.ctx.createGain();
      this.thrustGain.gain.value = 0;
      noise.connect(filter);
      filter.connect(this.thrustGain);
      this.thrustGain.connect(this.master);
      noise.start();

      this.startMusic();
    } catch (e) {
      this.ctx = null;
    }
  },

  toggleMute() {
    this.muted = !this.muted;
    if (this.master) this.master.gain.value = this.muted ? 0 : 0.6;
  },

  setThrust(on) {
    if (!this.ctx) return;
    this.thrustGain.gain.setTargetAtTime(on ? 0.22 : 0, this.ctx.currentTime, 0.05);
  },

  note(midi, when, duration, type, volume) {
    const osc = this.ctx.createOscillator();
    osc.type = type;
    osc.frequency.value = 440 * Math.pow(2, (midi - 69) / 12);
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(volume, when);
    gain.gain.exponentialRampToValueAtTime(0.001, when + duration);
    osc.connect(gain);
    gain.connect(this.master);
    osc.start(when);
    osc.stop(when + duration + 0.02);
  },

  blip(midi, delay, duration, volume) {
    if (!this.ctx) return;
    this.note(midi, this.ctx.currentTime + delay, duration, 'square', volume);
  },

  sfxLanding() {
    this.blip(72, 0, 0.1, 0.14);
    this.blip(79, 0.09, 0.16, 0.14);
  },

  sfxPickup() {
    this.blip(88, 0, 0.07, 0.13);
    this.blip(95, 0.06, 0.12, 0.13);
  },

  sfxSling() {
    this.blip(48, 0, 0.08, 0.16);
    this.blip(60, 0.05, 0.08, 0.16);
    this.blip(72, 0.1, 0.2, 0.16);
  },

  sfxVictory() {
    this.blip(72, 0, 0.12, 0.15);
    this.blip(76, 0.12, 0.12, 0.15);
    this.blip(79, 0.24, 0.12, 0.15);
    this.blip(84, 0.36, 0.4, 0.16);
  },

  sfxExplosion() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const duration = 0.7;
    const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * duration, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    }
    const src = this.ctx.createBufferSource();
    src.buffer = buffer;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 900;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(this.master);
    src.start(t);

    const osc = this.ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.5);
    const oscGain = this.ctx.createGain();
    oscGain.gain.setValueAtTime(0.25, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.connect(oscGain);
    oscGain.connect(this.master);
    osc.start(t);
    osc.stop(t + 0.55);
  },

  startMusic() {
    const LEAD = [76, 0, 79, 0, 83, 0, 79, 0, 76, 0, 79, 0, 84, 83, 79, 0,
                  76, 0, 79, 0, 83, 0, 86, 0, 88, 0, 86, 83, 79, 0, 0, 0];
    const BASS = [40, 43, 45, 43, 36, 40, 43, 47];
    const stepDuration = 0.115;
    this.musicNextTime = this.ctx.currentTime + 0.1;
    setInterval(() => {
      if (!this.ctx) return;
      while (this.musicNextTime < this.ctx.currentTime + 0.2) {
        const step = this.musicStep % 32;
        const lead = LEAD[step];
        if (lead) this.note(lead, this.musicNextTime, stepDuration * 0.9, 'square', 0.05);
        if (step % 4 === 0) {
          this.note(BASS[(step / 4) % 8], this.musicNextTime, stepDuration * 3.5, 'triangle', 0.09);
        }
        this.musicNextTime += stepDuration;
        this.musicStep++;
      }
    }, 80);
  },
};

function generateWorld(diffKey) {
  const diff = DIFFICULTIES[diffKey];
  platforms = [];
  for (let i = 0; i < diff.platforms; i++) {
    const w = CONFIG.padWidth;
    platforms.push({
      x: 40 + Math.random() * (W - 80 - w),
      y: (i + 1) * CONFIG.segmentHeight,
      w,
      lemonCollected: false,
    });
  }
  platforms.push({
    x: W / 2 - CONFIG.planetPadWidth / 2,
    y: (diff.platforms + 1) * CONFIG.segmentHeight,
    w: CONFIG.planetPadWidth,
    isPlanet: true,
  });
  moon.y = platforms[platforms.length - 1].y + CONFIG.moonDistance;
  worldTop = moon.y + 350;

  obstacles = [];
  const boundaries = [0, ...platforms.map(p => p.y)];
  for (let s = 0; s < boundaries.length - 1; s++) {
    const [minCount, maxCount] = diff.obstacleCount;
    const count = minCount + Math.floor(Math.random() * (maxCount - minCount + 1));
    for (let i = 0; i < count; i++) {
      const type = OBSTACLE_KEYS[Math.floor(Math.random() * OBSTACLE_KEYS.length)];
      const info = OBSTACLE_TYPES[type];
      const [minSpeed, maxSpeed] = diff.obstacleSpeed;
      obstacles.push({
        type,
        x: 30 + Math.random() * (W - 60),
        y: boundaries[s] + 140 + Math.random() * (boundaries[s + 1] - boundaries[s] - 280),
        dir: Math.random() < 0.5 ? -1 : 1,
        speed: minSpeed + Math.random() * (maxSpeed - minSpeed),
        bobAmp: info.bob,
        bobPhase: Math.random() * Math.PI * 2,
        radius: info.radius,
      });
    }
  }
}

function getActiveStats() {
  const stats = CHARACTERS[currentCharacter].stats;
  return {
    fuelMax: stats.fuelMax || CONFIG.fuelMax,
    refuelAmount: stats.refuelAmount || CONFIG.refuelAmount,
    rotationSpeed: CONFIG.rotationSpeed * (stats.rotationMult || 1),
    autoStabilizeRate: CONFIG.autoStabilizeRate * (stats.stabilizeMult || 1),
    extendedHud: stats.extendedHud || false,
  };
}

  currentDiff = diffKey;

  dragging = false;
  crashReason = '';
  state = 'playing';
  addToast(CHARACTERS[currentCharacter].startToast);
  addToast('PRESS UP TO LAUNCH');
}

// ---------------------------------------------------------------- update

function normalizeAngle(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}

function landingOk() {
  return Math.abs(rocket.vx) <= CONFIG.landingMaxVx &&
         Math.abs(rocket.vy) <= CONFIG.landingMaxVy &&
         Math.abs(normalizeAngle(rocket.angle)) <= CONFIG.landingMaxAngle;
}

function land(platform) {
  rocket.landed = true;
  rocket.y = (platform ? platform.y : 0) + CONFIG.rocketHalfHeight;
  rocket.vx = 0;
  rocket.vy = 0;
  rocket.angle = 0;
  audio.setThrust(false);
  if (!platform) {
    addToast('BACK ON EARTH');
    audio.sfxLanding();
    return;
  }
  if (platform.isPlanet && targetIndex === platforms.length - 1) {
    enterSlingshot(platform);
    return;
  }
  audio.sfxLanding();
}

function enterSlingshot(pad) {
  state = 'slingshot';
  slingPad = pad;
  slingAngle = 0;
  slingPower = 0.7;
  slingBanner = 3;
  rocket.fuel = getActiveStats().fuelMax;
  audio.sfxLanding();
}

function launchSlingshot() {
  const speed = slingPower * CONFIG.slingMaxSpeed;
  rocket.x = slingPad.x + slingPad.w / 2;
  rocket.y = slingPad.y + 34;
  rocket.vx = Math.sin(slingAngle) * speed;
  rocket.vy = Math.cos(slingAngle) * speed;
  rocket.angle = slingAngle;
  rocket.landed = false;
  ballistic = true;
  dragging = false;
  state = 'playing';
  audio.sfxSling();
}

function moonImpactWin() {
  rocket.x = Math.max(W / 2 - 140, Math.min(W / 2 + 140, rocket.x));
  rocket.y = moonSurfaceAt(rocket.x) + CONFIG.rocketHalfHeight;
  rocket.vx = 0;
  rocket.vy = 0;
  rocket.angle = 0;
  rocket.landed = true;
  ballistic = false;
  state = 'win';
  winTime = 0;
  confetti = [];
  lemonRain = [];
  audio.setThrust(false);
  audio.sfxVictory();
}

function collectLemon(platform) {
  const activeStats = getActiveStats();
  platform.lemonCollected = true;
  targetIndex++;
  rocket.fuel = Math.min(activeStats.fuelMax, rocket.fuel + activeStats.refuelAmount);
  addToast('+' + activeStats.refuelAmount + ' FUEL');
  audio.sfxPickup();
  const center = platform.x + platform.w / 2;
  for (let i = 0; i < 14; i++) {
    particles.push({
      x: center,
      y: platform.y + 24,
      vx: (Math.random() * 2 - 1) * 120,
      vy: (Math.random() * 2 - 1) * 120,
      life: 0.4 + Math.random() * 0.3,
      color: Math.random() < 0.5 ? '#6abf4b' : '#ffffff',
    });
  }
}

function crash(reason) {
  crashReason = (rocket.fuel <= 0 && reason === 'BAD LANDING') ? 'OUT OF FUEL' : reason;
  ballistic = false;
  state = 'exploding';
  explodeTimer = 1.3;
  audio.setThrust(false);
  audio.sfxExplosion();
  const colors = ['#f7dd2f', '#ffb020', '#ff4020', '#ffffff'];
  for (let i = 0; i < 46; i++) {
    particles.push({
      x: rocket.x,
      y: rocket.y,
      vx: (Math.random() * 2 - 1) * 170,
      vy: (Math.random() * 2 - 1) * 170 + 50,
      life: 0.6 + Math.random() * 0.7,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
}

function spawnThrustParticles() {
  const nozzleX = rocket.x - Math.sin(rocket.angle) * 18;
  const nozzleY = rocket.y - Math.cos(rocket.angle) * 18;
  const colors = ['#ffd166', '#ff7b3a', '#ffffff'];
  for (let i = 0; i < 2; i++) {
    thrustParticles.push({
      x: nozzleX,
      y: nozzleY,
      vx: rocket.vx - Math.sin(rocket.angle) * 90 + (Math.random() * 2 - 1) * 30,
      vy: rocket.vy - Math.cos(rocket.angle) * 90 + (Math.random() * 2 - 1) * 30,
      life: 0.3 + Math.random() * 0.2,
      color: colors[Math.floor(Math.random() * 3)],
    });
  }
}

function updateThrustParticles(dt) {
  for (const p of thrustParticles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  }
  thrustParticles = thrustParticles.filter(p => p.life > 0);
}

function updateObstacles(dt) {
  for (const o of obstacles) {
    o.x += o.dir * o.speed * dt;
    if (o.dir > 0 && o.x > W + 40) o.x = -40;
    if (o.dir < 0 && o.x < -40) o.x = W + 40;
  }
}

function obstacleY(o) {
  return o.y + (o.bobAmp ? Math.sin(time * 1.6 + o.bobPhase) * o.bobAmp : 0);
}

function updatePlaying(dt) {
  updateObstacles(dt);
  const activeStats = getActiveStats();

  if (rocket.landed) {
    audio.setThrust(false);
    if (keys.up && rocket.fuel > 0) {
      rocket.landed = false;
      rocket.vy = 10;
    } else {
      return;
    }
  }

  if (ballistic) {
    rocket.angle -= rocket.angle * Math.min(1, activeStats.autoStabilizeRate * dt);
  } else {
    if (keys.left) rocket.angle -= activeStats.rotationSpeed * dt;
    if (keys.right) rocket.angle += activeStats.rotationSpeed * dt;
    if (!keys.left && !keys.right) {
      rocket.angle -= rocket.angle * Math.min(1, activeStats.autoStabilizeRate * dt);
    }
  }
  rocket.angle = normalizeAngle(rocket.angle);

  const thrusting = !ballistic && keys.up && rocket.fuel > 0;
  if (thrusting) {
    rocket.vx += Math.sin(rocket.angle) * CONFIG.thrust * dt;
    rocket.vy += Math.cos(rocket.angle) * CONFIG.thrust * dt;
    rocket.fuel = Math.max(0, rocket.fuel - CONFIG.fuelBurnPerSecond * dt);
    spawnThrustParticles();
  }
  audio.setThrust(thrusting);
  rocket.vy -= CONFIG.gravity * dt;
  rocket.vx -= rocket.vx * CONFIG.drag * dt;
  rocket.vy -= rocket.vy * CONFIG.drag * dt;
  if (rocket.vy < -CONFIG.maxFallSpeed) rocket.vy = -CONFIG.maxFallSpeed;

  const prevBottom = rocket.y - CONFIG.rocketHalfHeight;
  rocket.x += rocket.vx * dt;
  rocket.y += rocket.vy * dt;

  if (rocket.x < CONFIG.wallMargin) { rocket.x = CONFIG.wallMargin; rocket.vx = Math.max(0, rocket.vx); }
  if (rocket.x > W - CONFIG.wallMargin) { rocket.x = W - CONFIG.wallMargin; rocket.vx = Math.min(0, rocket.vx); }
  if (rocket.y > worldTop) { rocket.y = worldTop; rocket.vy = Math.min(0, rocket.vy); }

  const newBottom = rocket.y - CONFIG.rocketHalfHeight;

  if (ballistic) {
    const dxMoon = rocket.x - moon.x;
    const dyMoon = rocket.y - moon.y;
    const hitDist = CONFIG.moonHitRadius + CONFIG.rocketRadius;
    if (dxMoon * dxMoon + dyMoon * dyMoon <= hitDist * hitDist) {
      moonImpactWin();
      return;
    }
    if (rocket.vy < 0 && rocket.y < platforms[platforms.length - 1].y + 60) {
      ballistic = false;
      addToast('MISSED! CONTROL RESTORED');
    }
  }

  const targetPlatform = platforms[targetIndex];
  if (!targetPlatform.isPlanet && !targetPlatform.lemonCollected) {
    const lemonX = targetPlatform.x + targetPlatform.w / 2;
    const lemonY = targetPlatform.y + 24;
    const dx = rocket.x - lemonX;
    const dy = rocket.y - lemonY;
    const reach = CONFIG.rocketRadius + 20;
    if (dx * dx + dy * dy < reach * reach) collectLemon(targetPlatform);
  }

  for (let i = 0; i < platforms.length; i++) {
    if (i > targetIndex) continue; // locked platforms are intangible
    const p = platforms[i];
    const centerOverPad = Math.abs(rocket.x - (p.x + p.w / 2)) <= p.w / 2;
    if (rocket.vy <= 0 && prevBottom >= p.y - 2 && newBottom <= p.y && centerOverPad) {
      if (landingOk()) land(p);
      else crash('BAD LANDING');
      return;
    }
    const boxOverlap = rocket.x + 8 > p.x && rocket.x - 8 < p.x + p.w &&
                       rocket.y - CONFIG.rocketHalfHeight < p.y && rocket.y + CONFIG.rocketHalfHeight > p.y - 12;
    if (boxOverlap) {
      crash('BAD LANDING');
      return;
    }
  }

  if (newBottom <= 0) {
    if (landingOk()) land(null);
    else crash('BAD LANDING');
    return;
  }

  for (const o of obstacles) {
    const dx = rocket.x - o.x;
    const dy = rocket.y - obstacleY(o);
    const minDist = CONFIG.rocketRadius + o.radius;
    if (dx * dx + dy * dy < minDist * minDist) {
      crash(OBSTACLE_TYPES[o.type].reason);
      return;
    }
  }
}

// top arc of the BIG moon shown in the win scene, anchored at the small moon's position
function moonSurfaceAt(x) {
  const dx = x - moon.x;
  if (Math.abs(dx) >= MOON_RADIUS) return -Infinity;
  return moon.y - (MOON_RADIUS - Math.sqrt(MOON_RADIUS * MOON_RADIUS - dx * dx));
}

function updateCelebration(dt) {
  if (winTime < 5) {
    for (let i = 0; i < 2; i++) {
      confetti.push({
        x: Math.random() * W,
        y: camY + H + 10,
        vx: (Math.random() * 2 - 1) * 40,
        vy: -(60 + Math.random() * 60),
        phase: Math.random() * Math.PI * 2,
        color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      });
    }
    if (Math.random() < 0.08 && lemonRain.length < 40) {
      lemonRain.push({
        x: 20 + Math.random() * (W - 40),
        y: camY + H + 20,
        vy: -(80 + Math.random() * 60),
        spin: (Math.random() * 2 - 1) * 4,
        angle: Math.random() * Math.PI * 2,
        rest: false,
      });
    }
  }
  for (const c of confetti) {
    c.x += (c.vx + Math.sin(time * 3 + c.phase) * 30) * dt;
    c.y += c.vy * dt;
  }
  confetti = confetti.filter(c => c.y > moonSurfaceAt(c.x) && c.y > camY - 40);
  for (const l of lemonRain) {
    if (l.rest) continue;
    l.y += l.vy * dt;
    l.angle += l.spin * dt;
    const surface = moonSurfaceAt(l.x);
    if (l.y <= surface + 6) {
      l.y = surface + 6;
      l.rest = true;
    }
  }
  lemonRain = lemonRain.filter(l => l.rest || l.y > camY - 40);
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy -= 120 * dt;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
}

function update(dt) {
  time += dt;
  for (const t of toasts) t.t -= dt;
  toasts = toasts.filter(t => t.t > 0);
  updateThrustParticles(dt);

  if (state === 'playing') {
    updatePlaying(dt);
  } else if (state === 'slingshot') {
    updateObstacles(dt);
    slingBanner -= dt;
    if (keys.left) slingAngle -= 1.2 * dt;
    if (keys.right) slingAngle += 1.2 * dt;
    slingAngle = Math.max(-1.0, Math.min(1.0, slingAngle));
    if (keys.up) slingPower += 0.7 * dt;
    if (keys.down) slingPower -= 0.7 * dt;
    slingPower = Math.max(0.25, Math.min(1, slingPower));
    const pull = slingPower * 26;
    rocket.angle = slingAngle;
    rocket.x = slingPad.x + slingPad.w / 2 - Math.sin(slingAngle) * pull;
    rocket.y = slingPad.y + 34 - Math.cos(slingAngle) * pull;
  } else if (state === 'exploding') {
    updateObstacles(dt);
    updateParticles(dt);
    explodeTimer -= dt;
    if (explodeTimer <= 0) state = 'lose';
  } else if (state === 'win') {
    winTime += dt;
    updateObstacles(dt);
    updateParticles(dt);
    updateCelebration(dt);
  } else if (state === 'lose') {
    updateObstacles(dt);
    updateParticles(dt);
  }

  if (state === 'playing' || state === 'slingshot' || state === 'exploding' || state === 'win' || state === 'lose') {
    const slingScene = state === 'slingshot' || (state === 'playing' && ballistic);
    const targetCam = slingScene
      ? platforms[platforms.length - 1].y - 100
      : Math.max(-60, Math.min(rocket.y - H * 0.45, worldTop - H + 40));
    camY += (targetCam - camY) * Math.min(1, dt * 5);
  }
}

// ---------------------------------------------------------------- render

function sy(worldY) {
  return H - (worldY - camY);
}

function lerpColor(c1, c2, t) {
  const a = parseInt(c1.slice(1), 16);
  const b = parseInt(c2.slice(1), 16);
  const r = Math.round(((a >> 16) & 255) + (((b >> 16) & 255) - ((a >> 16) & 255)) * t);
  const g = Math.round(((a >> 8) & 255) + (((b >> 8) & 255) - ((a >> 8) & 255)) * t);
  const bl = Math.round((a & 255) + ((b & 255) - (a & 255)) * t);
  return 'rgb(' + r + ',' + g + ',' + bl + ')';
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawVignette() {
  const gradient = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.75);
  gradient.addColorStop(0, 'rgba(0,0,0,0)');
  gradient.addColorStop(1, 'rgba(0,0,0,0.38)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);
}

function drawSpriteCentered(sprite, x, y, scale, alpha) {
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.drawImage(sprite, x - sprite.width * scale / 2, y - sprite.height * scale / 2, sprite.width * scale, sprite.height * scale);
  ctx.globalAlpha = 1;
}

function roleBadge(role) {
  if (role === 'PRODUTO') return 'P';
  if (role === 'DADOS') return 'A';
  return 'D';
}

function loadAvatars() {
  return Promise.all(CHAR_KEYS.map(key => new Promise(resolve => {
    const img = new Image();
    img.onload = () => { avatarSprites[key] = img; resolve(); };
    img.onerror = () => resolve();
    img.src = CHARACTERS[key].avatar;
  }))).then(() => { avatarsReady = true; });
}

function drawPixelAvatar(key, x, y, size, highlight) {
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  if (highlight) {
    ctx.shadowColor = 'rgba(255,209,102,0.55)';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = 'rgba(255,209,102,0.85)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x - 1, y - 1, size + 2, size + 2);
    ctx.shadowBlur = 0;
  }
  const img = avatarSprites[key];
  if (img) {
    ctx.drawImage(img, x, y, size, size);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(x, y, size, size);
    ctx.strokeStyle = 'rgba(120,160,255,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, size, size);
    ctx.font = 'bold ' + Math.round(size * 0.45) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#8fa3c8';
    ctx.fillText(roleBadge(CHARACTERS[key].role), x + size / 2, y + size / 2);
  }
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

function drawBackground(camPos) {
  const progress = Math.max(0, Math.min(1, camPos / Math.max(1, worldTop - H)));
  const top = lerpColor('#0d1330', '#04030c', progress);
  const bottom = lerpColor('#1a2450', '#0a0c22', progress);
  const gradient = ctx.createLinearGradient(0, 0, 0, H);
  gradient.addColorStop(0, top);
  gradient.addColorStop(1, bottom);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  for (const n of NEBULAE) {
    const span = H + 400;
    const yy = (((n.y - camPos * 0.15) % span) + span) % span - 200;
    const glow = ctx.createRadialGradient(n.x, yy, 0, n.x, yy, n.r);
    glow.addColorStop(0, 'rgba(' + n.color + ',0.10)');
    glow.addColorStop(1, 'rgba(' + n.color + ',0)');
    ctx.fillStyle = glow;
    ctx.fillRect(n.x - n.r, yy - n.r, n.r * 2, n.r * 2);
  }

  for (const s of stars) {
    const yy = (((s.y - camPos * s.parallax) % H) + H) % H;
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(time * 2 + s.twinkle);
    ctx.fillStyle = '#cfe3ff';
    ctx.fillRect(s.x, yy, s.size, s.size);
  }
  ctx.globalAlpha = 1;
}

function drawGround() {
  const groundY = sy(0);
  if (groundY > H + 60) return;
  ctx.fillStyle = '#2c4a28';
  ctx.fillRect(0, groundY, W, Math.max(0, H - groundY) + 60);
  ctx.fillStyle = '#1e3319';
  ctx.fillRect(0, groundY + 14, W, Math.max(0, H - groundY) + 60);
  ctx.fillStyle = '#ffd166';
  for (let i = 0; i < 14; i++) {
    const lx = (i * 137 + 40) % W;
    if (Math.abs(lx - W / 2) > 60) ctx.fillRect(lx, groundY + 22 + (i % 3) * 9, 2, 2);
  }
  // launch pad
  ctx.fillStyle = '#242c40';
  ctx.fillRect(W / 2 - 40, groundY - 2, 80, 8);
  ctx.shadowColor = '#41e0d0';
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#41e0d0';
  ctx.fillRect(W / 2 - 40, groundY - 4, 80, 3);
  ctx.shadowBlur = 0;
}

function drawBigMoon() {
  const surfaceY = sy(moon.y);
  if (surfaceY < -420) return;
  const cx = moon.x;
  const cy = surfaceY + MOON_RADIUS;
  ctx.shadowColor = '#aebbdd';
  ctx.shadowBlur = 46;
  ctx.fillStyle = '#cfd3d9';
  ctx.beginPath();
  ctx.arc(cx, cy, MOON_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aab0ba';
  const craters = [[-160, 60, 26], [-60, 130, 38], [90, 80, 22], [170, 160, 30], [10, 40, 12]];
  for (const [dx, dy, r] of craters) {
    ctx.beginPath();
    ctx.arc(cx + dx, cy + dy - MOON_RADIUS + 90, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawSmallMoon() {
  const y = sy(moon.y);
  if (y < -40 || y > H + 40) return;
  ctx.shadowColor = '#cfd3d9';
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#cfd3d9';
  ctx.beginPath();
  ctx.arc(moon.x, y, CONFIG.moonHitRadius, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#aab0ba';
  ctx.beginPath();
  ctx.arc(moon.x - 6, y - 4, 4, 0, Math.PI * 2);
  ctx.arc(moon.x + 5, y + 6, 3, 0, Math.PI * 2);
  ctx.fill();
  if (state === 'slingshot' || ballistic) {
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#cfe3ff';
    ctx.fillText('MOON', moon.x, y - 30);
    ctx.textAlign = 'left';
  }
}

function drawPlanet(p, index) {
  const topY = sy(p.y);
  if (topY < -130 || topY > H + 130) return;
  const tangible = index <= targetIndex;
  const isTarget = index === targetIndex;
  const cx = p.x + p.w / 2;
  const cy = topY + 42;
  ctx.globalAlpha = tangible ? 1 : 0.2;
  ctx.strokeStyle = '#c9a86a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 62, 14, -0.25, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#3aa6a0';
  ctx.beginPath();
  ctx.arc(cx, cy, 42, 0, Math.PI * 2);
  ctx.fill();
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, 42, 0, Math.PI * 2);
  ctx.clip();
  ctx.fillStyle = '#2e837e';
  ctx.fillRect(cx - 42, cy - 8, 84, 7);
  ctx.fillRect(cx - 42, cy + 12, 84, 6);
  ctx.restore();
  // landing strip
  const pulse = 0.6 + 0.4 * Math.sin(time * 5);
  const edgeColor = isTarget ? '#ffd166' : '#41e0d0';
  ctx.shadowColor = edgeColor;
  ctx.shadowBlur = isTarget ? 14 * pulse : 6;
  ctx.fillStyle = edgeColor;
  ctx.fillRect(p.x, topY, p.w, 3);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function drawLemons() {
  for (let i = 0; i < platforms.length - 1; i++) {
    const p = platforms[i];
    if (p.lemonCollected) continue;
    const y = sy(p.y + 24) + Math.sin(time * 2.5 + i) * 4;
    if (y < -30 || y > H + 30) continue;
    const x = p.x + p.w / 2;
    const active = i === targetIndex;
    ctx.globalAlpha = active ? 1 : 0.25;
    if (active) {
      ctx.shadowColor = '#6abf4b';
      ctx.shadowBlur = 14;
    }
    ctx.drawImage(SPRITES.lemon, x - 9, y - 7, 18, 14);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function drawCelebration() {
  for (const c of confetti) {
    ctx.fillStyle = c.color;
    ctx.fillRect(c.x - 2, sy(c.y) - 2, 4, 4);
  }
  for (const l of lemonRain) {
    ctx.save();
    ctx.translate(l.x, sy(l.y));
    ctx.rotate(l.angle);
    ctx.drawImage(SPRITES.lemon, -7, -6, 14, 11);
    ctx.restore();
  }
}

function drawWinScene() {
  const dir = rocket.x < W - 110 ? 1 : -1;
  if (winTime < 0.6) return;
  const startX = rocket.x + 16 * dir;
  const endX = rocket.x + 56 * dir;
  const walkT = Math.max(0, Math.min(1, (winTime - 0.6) / 1.4));
  const ax = startX + (endX - startX) * walkT;
  const feetY = sy(moonSurfaceAt(ax));
  const bob = walkT < 1 ? Math.abs(Math.sin(winTime * 10)) * 2 : 0;
  ctx.drawImage(SPRITES.astronaut, ax - 8, feetY - 24 - bob, 16, 24);
  if (winTime > 2.2) {
    const poleHeight = Math.min(1, (winTime - 2.2) / 0.5) * 32;
    const poleX = ax + 16 * dir;
    const poleBaseY = sy(moonSurfaceAt(poleX));
    ctx.fillStyle = '#e8ecf4';
    ctx.fillRect(poleX, poleBaseY - poleHeight, 2, poleHeight);
    if (poleHeight >= 32) {
      const flagX = dir > 0 ? poleX + 2 : poleX - 26;
      ctx.drawImage(SPRITES.flag, flagX, poleBaseY - 32, 26, 14);
    }
  }
}

function drawPlatform(p, index) {
  const y = sy(p.y);
  if (y < -40 || y > H + 40) return;
  const tangible = index <= targetIndex;
  const isTarget = index === targetIndex;
  ctx.globalAlpha = tangible ? 1 : 0.2;
  ctx.fillStyle = '#242c40';
  ctx.fillRect(p.x, y + 2, p.w, 8);
  ctx.fillStyle = '#161c2c';
  ctx.fillRect(p.x + 6, y + 10, 4, 9);
  ctx.fillRect(p.x + p.w - 10, y + 10, 4, 9);
  const pulse = 0.6 + 0.4 * Math.sin(time * 5);
  const edgeColor = isTarget ? '#ffd166' : '#41e0d0';
  ctx.shadowColor = edgeColor;
  ctx.shadowBlur = isTarget ? 14 * pulse : 6;
  ctx.fillStyle = edgeColor;
  ctx.fillRect(p.x, y, p.w, 3);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function drawObstacles() {
  for (const o of obstacles) {
    const y = sy(obstacleY(o));
    if (y < -40 || y > H + 40) continue;
    const sprite = SPRITES[o.type];
    let alpha = 1;
    if (o.type === 'ray') alpha = 0.55 + 0.45 * Math.sin(time * 18 + o.bobPhase);
    drawSpriteCentered(sprite, o.x, y, 2, alpha);
  }
}

function drawRocket() {
  const x = rocket.x;
  const y = sy(rocket.y);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rocket.angle);
  ctx.drawImage(SPRITES.rocket, -11, -16, 22, 32);
  if (state === 'playing' && !rocket.landed && keys.up && rocket.fuel > 0) {
    const flame = Math.floor(time * 14) % 2 === 0 ? SPRITES.flame1 : SPRITES.flame2;
    ctx.drawImage(flame, -5, 15, 10, 8);
  }
  ctx.restore();
}

function drawSlingshotRig() {
  const centerX = slingPad.x + slingPad.w / 2;
  const padY = sy(slingPad.y);
  const forkY = padY - 22;
  ctx.strokeStyle = '#8b5a2b';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(centerX, padY);
  ctx.lineTo(centerX, forkY);
  ctx.moveTo(centerX, forkY);
  ctx.lineTo(centerX - 12, forkY - 14);
  ctx.moveTo(centerX, forkY);
  ctx.lineTo(centerX + 12, forkY - 14);
  ctx.stroke();
  // elastic bands to the rocket tail
  const tailX = rocket.x - Math.sin(rocket.angle) * 16;
  const tailY = sy(rocket.y - Math.cos(rocket.angle) * 16);
  ctx.strokeStyle = '#c2455a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(centerX - 12, forkY - 14);
  ctx.lineTo(tailX, tailY);
  ctx.lineTo(centerX + 12, forkY - 14);
  ctx.stroke();
  ctx.lineWidth = 1;
}

function drawSlingshotUI() {
  // trajectory preview
  let px = slingPad.x + slingPad.w / 2;
  let py = slingPad.y + 34;
  const speed = slingPower * CONFIG.slingMaxSpeed;
  let vx = Math.sin(slingAngle) * speed;
  let vy = Math.cos(slingAngle) * speed;
  const dt = 1 / 30;
  const hitDist = CONFIG.moonHitRadius + CONFIG.rocketRadius;
  for (let i = 0; i < 90; i++) {
    vx -= vx * CONFIG.drag * dt;
    vy -= (CONFIG.gravity + vy * CONFIG.drag) * dt;
    px += vx * dt;
    py += vy * dt;
    const dxMoon = px - moon.x;
    const dyMoon = py - moon.y;
    if (dxMoon * dxMoon + dyMoon * dyMoon <= hitDist * hitDist) break;
    if (px < CONFIG.wallMargin || px > W - CONFIG.wallMargin) break;
    if (py < slingPad.y) break;
    if (i % 3 === 0) {
      ctx.globalAlpha = 0.8 * (1 - i / 90);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(px - 1.5, sy(py) - 1.5, 3, 3);
    }
  }
  ctx.globalAlpha = 1;
  drawCenteredText([
    ['DRAG THE ROCKET BACK AND RELEASE', 622, 12, '#cfe3ff'],
    ['HIT THE MOON!', 644, 14, '#ffd166', true],
    ['(OR AIM WITH ARROWS + SPACE)', 668, 10, '#8892a6'],
  ]);
}

function drawParticles() {
  for (const p of thrustParticles) {
    ctx.globalAlpha = Math.min(1, p.life * 3);
    ctx.fillStyle = p.color;
    const size = 1 + p.life * 5;
    ctx.fillRect(p.x - size / 2, sy(p.y) - size / 2, size, size);
  }
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.life * 1.6);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 2, sy(p.y) - 2, 4, 4);
  }
  ctx.globalAlpha = 1;
}

function speedColor(value, limit) {
  return Math.abs(value) <= limit ? '#57c74f' : '#ff5050';
}

function drawHUD() {
  const activeStats = getActiveStats();
  const hudHeight = activeStats.extendedHud ? 82 : 62;
  ctx.fillStyle = 'rgba(8,12,26,0.62)';
  roundRect(8, 8, W - 16, hudHeight, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(120,160,255,0.18)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.textAlign = 'left';
  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = '#8fa3c8';
  ctx.fillText('FUEL', 20, 26);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  roundRect(20, 32, 150, 8, 4);
  ctx.fill();
  const ratio = rocket.fuel / activeStats.fuelMax;
  const low = rocket.fuel <= 20;
  const barColor = rocket.fuel > 40 ? '#3ddc84' : (low ? '#ff4d5e' : '#ffb020');
  if (!low || Math.floor(time * 5) % 2 === 0) {
    ctx.shadowColor = barColor;
    ctx.shadowBlur = 6;
    ctx.fillStyle = barColor;
    roundRect(20, 32, Math.max(6, 150 * ratio), 8, 4);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // target distance + velocity
  const target = platforms[targetIndex];
  const slingScene = state === 'slingshot' || ballistic;
  const distance = slingScene
    ? Math.max(0, Math.round((moon.y - rocket.y) / 10))
    : Math.max(0, Math.round((target.y - rocket.y) / 10));
  const label = slingScene ? 'MOON ' : (target.isPlanet ? 'PLANET ' : 'NEXT LEMON ');
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = '#cfe3ff';
  ctx.fillText(label + distance + 'm', 20, 58);
  if (state === 'slingshot') {
    ctx.fillStyle = '#ffd166';
    ctx.fillText('ANGLE ' + Math.round(slingAngle * 180 / Math.PI), 160, 58);
    ctx.fillText('POWER ' + Math.round(slingPower * 100) + '%', 245, 58);
  } else {
    ctx.fillStyle = speedColor(rocket.vx, CONFIG.landingMaxVx);
    ctx.fillText('VX ' + (Math.abs(rocket.vx) / 10).toFixed(1), 160, 58);
    ctx.fillStyle = speedColor(rocket.vy, CONFIG.landingMaxVy);
    ctx.fillText('VY ' + (Math.abs(rocket.vy) / 10).toFixed(1), 225, 58);
  }

  if (activeStats.extendedHud) {
    const angleDeg = Math.round(Math.abs(normalizeAngle(rocket.angle)) * 180 / Math.PI);
    const fuelPct = Math.round(ratio * 100);
    const vxOk = Math.abs(rocket.vx) <= CONFIG.landingMaxVx;
    const vyOk = Math.abs(rocket.vy) <= CONFIG.landingMaxVy;
    const angOk = Math.abs(normalizeAngle(rocket.angle)) <= CONFIG.landingMaxAngle;
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = '#8fa3c8';
    ctx.fillText('ANG ' + angleDeg + '\u00B0', 20, 74);
    ctx.fillStyle = speedColor(100 - fuelPct, 60);
    ctx.fillText('FUEL ' + fuelPct + '%', 95, 74);
    ctx.fillStyle = vxOk ? '#57c74f' : '#ff5050';
    ctx.fillText('VX' + (vxOk ? '\u2713' : '\u2717'), 175, 74);
    ctx.fillStyle = vyOk ? '#57c74f' : '#ff5050';
    ctx.fillText('VY' + (vyOk ? '\u2713' : '\u2717'), 215, 74);
    ctx.fillStyle = angOk ? '#57c74f' : '#ff5050';
    ctx.fillText('ANG' + (angOk ? '\u2713' : '\u2717'), 255, 74);
  }

  // progress + attempts + pilot avatar
  const hudRight = W - 88;
  drawPixelAvatar(currentCharacter, W - 36, 14, 24, false);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#cfe3ff';
  const total = platforms.length - 1;
  const progressText = slingScene ? 'TARGET: MOON'
    : (target.isPlanet ? 'TARGET: PLANET' : 'PAD ' + (targetIndex + 1) + '/' + total);
  ctx.fillText(progressText, hudRight, 26);
  ctx.fillStyle = '#8fa3c8';
  ctx.fillText('ATTEMPT ' + attempts, hudRight, 42);
  ctx.fillText(CHARACTERS[currentCharacter].shortName, hudRight, 58);
  if (activeStats.extendedHud) {
    ctx.fillText(DIFFICULTIES[currentDiff].label, hudRight, 74);
  }

  // offscreen target arrow
  const targetScreenY = sy(target.y);
  if (targetScreenY < 30 && state === 'playing') {
    const ax = Math.max(20, Math.min(W - 20, target.x + target.w / 2));
    ctx.shadowColor = '#ffd166';
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ffd166';
    ctx.beginPath();
    ctx.moveTo(ax - 8, 92);
    ctx.lineTo(ax + 8, 92);
    ctx.lineTo(ax, 80);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.textAlign = 'center';
    ctx.fillText(distance + 'm', ax, 108);
  }
  ctx.textAlign = 'left';
}

function drawToasts() {
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  let y = 180;
  for (const t of toasts) {
    ctx.globalAlpha = Math.min(1, t.t);
    ctx.fillStyle = '#ffd166';
    ctx.fillText(t.text, W / 2, y);
    y += 22;
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawCenteredText(lines) {
  ctx.textAlign = 'center';
  for (const [text, y, size, color, glow] of lines) {
    ctx.font = 'bold ' + size + 'px monospace';
    ctx.fillStyle = color;
    if (glow) {
      ctx.shadowColor = color;
      ctx.shadowBlur = 18;
    }
    ctx.fillText(text, W / 2, y);
    ctx.shadowBlur = 0;
  }
  ctx.textAlign = 'left';
}

function wrapTextLines(text, maxWidth, font) {
  ctx.font = font;
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function truncateText(text, maxWidth, font) {
  ctx.font = font;
  if (ctx.measureText(text).width <= maxWidth) return text;
  let trimmed = text;
  while (trimmed.length > 0 && ctx.measureText(trimmed + '...').width > maxWidth) {
    trimmed = trimmed.slice(0, -1);
  }
  return trimmed + '...';
}

function drawWrappedText(text, x, y, maxWidth, font, color, lineHeight, maxLines) {
  let lines = wrapTextLines(text, maxWidth, font);
  if (maxLines && lines.length > maxLines) {
    lines = lines.slice(0, maxLines);
    lines[maxLines - 1] = truncateText(lines[maxLines - 1], maxWidth, font);
  }
  ctx.font = font;
  ctx.fillStyle = color;
  ctx.textAlign = 'left';
  lines.forEach((line, i) => ctx.fillText(line, x, y + i * lineHeight));
  return lines.length;
}

function renderTitle() {
  drawBackground(time * 12);
  drawCenteredText([
    ['ROCKET', 160, 52, '#f4f6fb', true],
    ['LEMON', 220, 52, '#ffd166', true],
    ['LAUNCH TO THE MOON', 258, 14, '#cfe3ff'],
  ]);
  ctx.save();
  ctx.translate(W / 2, 400);
  ctx.drawImage(SPRITES.rocket, -33, -48, 66, 96);
  const flame = Math.floor(time * 10) % 2 === 0 ? SPRITES.flame1 : SPRITES.flame2;
  ctx.drawImage(flame, -15, 46, 30, 24);
  ctx.restore();
  if (Math.floor(time * 2) % 2 === 0) {
    drawCenteredText([['PRESS ENTER TO START', 560, 16, '#ffffff', true]]);
  }
  drawCenteredText([
    ['LEFT/RIGHT ROTATE - UP THRUST - M MUTE', 640, 11, '#8892a6'],
    ['GRAB EVERY LEMON. LAND GENTLY ON THE MOON.', 662, 11, '#8892a6'],
  ]);
  drawVignette();
}

function renderCharacterMenu() {
  const cardX = 70;
  const cardW = W - 140;
  const cardH = 84;
  const cardGap = 96;
  const cardTop = 188;
  const textX = cardX + 62;
  const textW = cardW - 72;

  drawBackground(time * 12);
  drawCenteredText([['SELECT PILOT', 130, 24, '#ffd166', true]]);
  CHAR_KEYS.forEach((key, i) => {
    const ch = CHARACTERS[key];
    const top = cardTop + i * cardGap;
    const selected = i === menuIndex;
    if (selected) {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      roundRect(cardX, top, cardW, cardH, 10);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,209,102,0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    drawPixelAvatar(key, cardX + 12, top + 22, 40, selected);
    const nameColor = selected ? '#ffffff' : '#8892a6';
    const roleColor = selected ? '#ffd166' : '#5a6478';
    const descColor = selected ? '#cfe3ff' : '#5a6478';
    const nameFont = selected ? 'bold 12px monospace' : '12px monospace';
    const nameLineH = 14;
    const nameLines = drawWrappedText(ch.label, textX, top + 16, textW, nameFont, nameColor, nameLineH, 2);
    const roleY = top + 16 + nameLines * nameLineH + 2;
    ctx.font = '10px monospace';
    ctx.fillStyle = roleColor;
    ctx.textAlign = 'left';
    ctx.fillText(truncateText(ch.role + ' - ' + ch.bonus, textW, '10px monospace'), textX, roleY);
    drawWrappedText(ch.desc, textX, roleY + 13, textW, '10px monospace', descColor, 12, 2);
  });
  drawCenteredText([['UP/DOWN SELECT - 1-4 SHORTCUT - ENTER CONTINUE - ESC BACK', 680, 10, '#8892a6']]);
  drawVignette();
}

function renderMenu() {
  drawBackground(time * 12);
  drawCenteredText([['SELECT DIFFICULTY', 150, 24, '#ffd166', true]]);
  DIFF_KEYS.forEach((key, i) => {
    const diff = DIFFICULTIES[key];
    const y = 260 + i * 90;
    const selected = i === menuIndex;
    if (selected) {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      roundRect(90, y - 26, W - 180, 66, 10);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,209,102,0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    drawCenteredText([
      [diff.label, y, 24, selected ? '#ffffff' : '#8892a6', selected],
      [diff.desc, y + 24, 11, selected ? '#cfe3ff' : '#5a6478'],
    ]);
  });
  drawCenteredText([['UP/DOWN SELECT - ENTER LAUNCH - ESC BACK', 620, 11, '#8892a6']]);
  drawVignette();
}

function renderWorld() {
  drawBackground(camY);
  if (state === 'win') drawBigMoon();
  else drawSmallMoon();
  drawGround();
  platforms.forEach((p, i) => { if (p.isPlanet) drawPlanet(p, i); else drawPlatform(p, i); });
  drawLemons();
  drawObstacles();
  if (state === 'slingshot') drawSlingshotRig();
  if (state !== 'exploding' && state !== 'lose') drawRocket();
  if (state === 'slingshot') drawSlingshotUI();
  if (state === 'slingshot' && slingBanner > 0) {
    ctx.globalAlpha = Math.min(1, slingBanner);
    drawCenteredText([
      ['SLINGSHOT MODE!', 300, 32, '#ffd166', true],
      ['NEW MECHANIC: DRAG BACK AND HIT THE MOON', 336, 12, '#ffffff'],
    ]);
    ctx.globalAlpha = 1;
  }
  if (state === 'win') {
    drawWinScene();
    drawCelebration();
  }
  drawParticles();
  drawVignette();
  drawHUD();
  drawToasts();

  if (state === 'win' && winTime > 3.2) {
    ctx.fillStyle = 'rgba(10,14,30,0.82)';
    roundRect(60, 96, W - 120, 196, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,209,102,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
    drawCenteredText([
      ['YOU REACHED', 148, 30, '#ffd166', true],
      ['THE MOON!', 186, 30, '#ffd166', true],
      ['ATTEMPTS: ' + attempts, 228, 14, '#cfe3ff'],
      ['R RETRY - ENTER MENU', 264, 13, '#ffffff'],
    ]);
  } else if (state === 'lose') {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(10,14,30,0.85)';
    roundRect(60, 240, W - 120, 230, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(120,160,255,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
    drawCenteredText([
      ['CRASHED!', 305, 36, '#ff4d5e', true],
      [crashReason, 345, 14, '#cfe3ff'],
      ['ATTEMPT ' + attempts, 385, 13, '#8fa3c8'],
      ['R RETRY - ENTER MENU', 440, 13, '#ffffff'],
    ]);
  }
}

function render() {
  if (state === 'title') renderTitle();
  else if (state === 'character') renderCharacterMenu();
  else if (state === 'difficulty') renderMenu();
  else renderWorld();
}

// ---------------------------------------------------------------- input

window.addEventListener('keydown', (e) => {
  if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
  audio.init();
  if (e.key === 'm' || e.key === 'M') { audio.toggleMute(); return; }

  if (state === 'title') {
    if (e.key === 'Enter' || e.key === ' ') { state = 'character'; menuIndex = 0; }
  } else if (state === 'character') {
    if (e.key === 'ArrowUp' && !e.repeat) menuIndex = (menuIndex + 3) % 4;
    else if (e.key === 'ArrowDown' && !e.repeat) menuIndex = (menuIndex + 1) % 4;
    else if (e.key === '1') menuIndex = 0;
    else if (e.key === '2') menuIndex = 1;
    else if (e.key === '3') menuIndex = 2;
    else if (e.key === '4') menuIndex = 3;
    else if (e.key === 'Enter' || e.key === ' ') {
      currentCharacter = CHAR_KEYS[menuIndex];
      state = 'difficulty';
      menuIndex = 0;
    } else if (e.key === 'Escape') state = 'title';
  } else if (state === 'difficulty') {
    if (e.key === 'ArrowUp' && !e.repeat) menuIndex = (menuIndex + 2) % 3;
    else if (e.key === 'ArrowDown' && !e.repeat) menuIndex = (menuIndex + 1) % 3;
    else if (e.key === '1') menuIndex = 0;
    else if (e.key === '2') menuIndex = 1;
    else if (e.key === '3') menuIndex = 2;
    else if (e.key === 'Enter' || e.key === ' ') startGame(DIFF_KEYS[menuIndex], false);
    else if (e.key === 'Escape') { state = 'character'; menuIndex = CHAR_KEYS.indexOf(currentCharacter); }
  } else if (state === 'slingshot') {
    if (e.key === ' ' || e.key === 'Enter') launchSlingshot();
  } else if (state === 'win' || state === 'lose') {
    if (e.key === 'r' || e.key === 'R') startGame(currentDiff, true);
    else if (e.key === 'Enter' || e.key === 'Escape') state = 'title';
  }

  if (e.key === 'ArrowLeft') keys.left = true;
  if (e.key === 'ArrowRight') keys.right = true;
  if (e.key === 'ArrowUp') keys.up = true;
  if (e.key === 'ArrowDown') keys.down = true;
});

function canvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (W / rect.width),
    y: (e.clientY - rect.top) * (H / rect.height),
  };
}

canvas.addEventListener('mousedown', (e) => {
  if (state !== 'slingshot') return;
  const m = canvasPos(e);
  const dx = m.x - rocket.x;
  const dy = m.y - sy(rocket.y);
  if (dx * dx + dy * dy < 60 * 60) dragging = true;
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging || state !== 'slingshot') return;
  const m = canvasPos(e);
  const anchorX = slingPad.x + slingPad.w / 2;
  const anchorY = sy(slingPad.y + 34);
  const dx = m.x - anchorX;
  const dy = m.y - anchorY;
  if (dy <= 4) return; // must pull downward, like drawing a sling
  slingAngle = Math.max(-1.2, Math.min(1.2, Math.atan2(-dx, dy)));
  const pullDistance = Math.sqrt(dx * dx + dy * dy);
  slingPower = Math.max(0.25, Math.min(1, pullDistance / 90));
});

canvas.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  if (state === 'slingshot') launchSlingshot();
});

window.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft') keys.left = false;
  if (e.key === 'ArrowRight') keys.right = false;
  if (e.key === 'ArrowUp') keys.up = false;
  if (e.key === 'ArrowDown') keys.down = false;
});

// ---------------------------------------------------------------- main loop

let lastTime = 0;
function frame(t) {
  const dt = Math.min((t - lastTime) / 1000, 1 / 30);
  lastTime = t;
  update(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
loadAvatars();

// debug/test hooks
window.__rl = {
  CONFIG, DIFFICULTIES, startGame, update, render, keys, audio,
  get state() { return state; },
  set state(v) { state = v; },
  get rocket() { return rocket; },
  get platforms() { return platforms; },
  get obstacles() { return obstacles; },
  get targetIndex() { return targetIndex; },
  set targetIndex(v) { targetIndex = v; },
  get crashReason() { return crashReason; },
  get attempts() { return attempts; },
  get winTime() { return winTime; },
  get confetti() { return confetti; },
  get lemonRain() { return lemonRain; },
  get slingAngle() { return slingAngle; },
  set slingAngle(v) { slingAngle = v; },
  get slingPower() { return slingPower; },
  set slingPower(v) { slingPower = v; },
  get ballistic() { return ballistic; },
  get moon() { return moon; },
  launchSlingshot,
};
</script>
</body>
